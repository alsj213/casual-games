<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>卡路里猜猜看 - Casual Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
        }
        
        .food-image {
            transition: transform 0.3s ease;
        }
        
        .food-image:hover {
            transform: scale(1.02);
        }
        
        .guess-history {
            max-height: 180px;
            overflow-y: auto;
        }
        
        .guess-item {
            animation: slideIn 0.2s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .calorie-input::-webkit-inner-spin-button,
        .calorie-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .calorie-input {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-green-300 to-emerald-100 bg-clip-text text-transparent mb-2">🔥 卡路里猜猜看</h1>
            <p class="text-green-100 text-sm">常见食物猜猜卡路里，提示高了还是低了，猜对获胜！</p>
        </div>

        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-5 shadow-xl mb-5">
            <div class="mb-4">
                <h2 id="food-name" class="text-xl font-semibold mb-3 text-center text-white"></h2>
                <div class="aspect-square bg-white/20 rounded-xl overflow-hidden flex items-center justify-center">
                    <img id="food-image" class="food-image w-full h-full object-contain bg-white p-2 rounded">
                </div>
            </div>
            
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-green-100 text-sm">剩余猜测次数</span>
                    <span id="guesses-left" class="text-yellow-300 font-bold text-xl">8</span>
                </div>
                <div class="w-full bg-white/20 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-yellow-400 h-full transition-all duration-300" style="width: 100%"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-green-100 text-sm mb-2">输入你的猜测 (卡路里 kcal)</label>
                <div class="flex gap-2">
                    <input type="number" id="calorie-input" placeholder="输入卡路里" 
                           class="calorie-input flex-1 px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-green-200 focus:outline-none focus:border-yellow-400">
                    <button id="guess-btn" class="px-6 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-semibold text-gray-900 hover:opacity-90 transition-opacity">
                        猜测
                    </button>
                </div>
                <p id="hint-text" class="text-sm mt-2 text-center"></p>
            </div>

            <div>
                <div class="text-green-100 text-sm mb-2">猜测记录</div>
                <div id="guess-history" class="guess-history space-y-2"></div>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="hint-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-semibold text-gray-900 hover:opacity-90 transition-opacity">
                💡 提示
            </button>
            <button id="new-game-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold text-white hover:opacity-90 transition-opacity">
                🔄 换一题
            </button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-8 max-w-sm w-full text-center">
            <div id="modal-icon" class="text-6xl mb-4"></div>
            <h2 id="modal-title" class="text-2xl font-bold mb-2 text-white"></h2>
            <p id="modal-message" class="text-gray-300 mb-6"></p>
            <div class="flex gap-2">
                <button id="modal-new-game" class="flex-1 px-6 py-3 bg-gradient-to-r from-green-400 to-blue-500 rounded-xl font-semibold hover:opacity-90 transition-opacity">
                    再来一题
                </button>
            </div>
        </div>
    </div>

        let gameState = {
            currentFood: null,
            guessesLeft: 0,
            guesses: []
        };

        const elements = {
            foodName: document.getElementById('food-name'),
            foodImage: document.getElementById('food-image'),
            guessesLeft: document.getElementById('guesses-left'),
            progressBar: document.getElementById('progress-bar'),
            calorieInput: document.getElementById('calorie-input'),
            guessBtn: document.getElementById('guess-btn'),
            guessHistory: document.getElementById('guess-history'),
            hintText: document.getElementById('hint-text'),
            hintBtn: document.getElementById('hint-btn'),
            newGameBtn: document.getElementById('new-game-btn'),
            modal: document.getElementById('modal'),
            modalIcon: document.getElementById('modal-icon'),
            modalTitle: document.getElementById('modal-title'),
            modalMessage: document.getElementById('modal-message'),
            modalNewGame: document.getElementById('modal-new-game')
        };

        function startNewGame() {
            // 随机选择一个食物
            const randomIndex = Math.floor(Math.random() * foods.length);
            gameState.currentFood = foods[randomIndex];
            gameState.guessesLeft = 8;
            gameState.guesses = [];
            
            // Update UI
            elements.foodName.textContent = gameState.currentFood.name;
            // 使用占位颜色代替图片，避免图片加载问题
            elements.foodImage.onerror = function() {
                this.style.display = 'none';
                this.parentElement.style.backgroundColor = 'rgba(255,255,255,0.2)';
                const text = document.createElement('div');
                text.className = 'text-white text-4xl';
                text.textContent = '🍽️';
                this.parentElement.appendChild(text);
            };
            
            updateUI();
            elements.guessHistory.innerHTML = '';
            elements.hintText.textContent = '';
            elements.calorieInput.value = '';
            elements.calorieInput.focus();
        }

        function updateUI() {
            elements.guessesLeft.textContent = gameState.guessesLeft;
            const percentage = (gameState.guessesLeft / 8) * 100;
            elements.progressBar.style.width = percentage + '%';
        }

        function addGuess(guess, hint) {
            const guessDiv = document.createElement('div');
            guessDiv.className = `guess-item px-4 py-3 rounded-lg flex items-center justify-between ${hint.hintClass}`;
            guessDiv.innerHTML = `
                <span class="font-semibold text-white">${guess} kcal</span>
                <span class="text-sm ${hint.textClass}">${hint.text}</span>
            `;
            elements.guessHistory.insertBefore(guessDiv, elements.guessHistory.firstChild);
        }

        function handleGuess() {
            const inputVal = elements.calorieInput.value.trim();
            if (!inputVal) {
                elements.hintText.textContent = '⚠️ 请输入卡路里';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            const guess = parseInt(inputVal);
            if (isNaN(guess) || guess < 0 || guess > 5000) {
                elements.hintText.textContent = '⚠️ 请输入有效的卡路里 (0-5000)';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            // 检查是否已经猜过这个数字
            if (gameState.guesses.includes(guess)) {
                elements.hintText.textContent = '⚠️ 你已经猜过这个数字了';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            gameState.guesses.push(guess);
            gameState.guessesLeft--;

            const actual = gameState.currentFood.calories;
            let hint;

            if (guess === actual) {
                // 猜对了
                showModal(true);
                return;
            } else if (guess > actual) {
                hint = { 
                    text: '🔽 太高了', 
                    hintClass: 'bg-orange-500/20 border border-orange-500/50', 
                    textClass: 'text-orange-300' 
                };
                elements.hintText.textContent = '🔽 太高了，再试试低点';
                elements.hintText.className = 'text-orange-300 text-sm mt-2 text-center';
            } else {
                hint = { 
                    text: '🔼 太低了', 
                    hintClass: 'bg-blue-500/20 border border-blue-500/50', 
                    textClass: 'text-blue-300' 
                };
                elements.hintText.textContent = '🔼 太低了，再试试高点';
                elements.hintText.className = 'text-blue-300 text-sm mt-2 text-center';
            }

            addGuess(guess, hint);
            updateUI();
            elements.calorieInput.value = '';
            elements.calorieInput.focus();

            if (gameState.guessesLeft <= 0) {
                // 游戏结束
                showModal(false, actual);
            }
        }

        function showModal(won, actual) {
            if (won) {
                elements.modalIcon.textContent = '🎉';
                elements.modalTitle.textContent = '恭喜猜对了！';
                elements.modalMessage.textContent = `正确答案就是 ${gameState.currentFood.calories} 卡路里`;
            } else {
                elements.modalIcon.textContent = '😔';
                elements.modalTitle.textContent = '游戏结束';
                elements.modalMessage.textContent = `正确答案是 ${actual} 卡路里，下次加油！`;
            }
            elements.modal.classList.remove('hidden');
        }

        // Event bindings
        elements.guessBtn.addEventListener('click', handleGuess);
        elements.calorieInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleGuess();
            }
        });
        elements.newGameBtn.addEventListener('click', startNewGame);
        elements.hintBtn.addEventListener('click', () => {
            // 提示：范围提示
            const actual = gameState.currentFood.calories;
            let range = 50;
            if (actual > 500) range = 100;
            if (actual > 1000) range = 200;
            const min = Math.max(0, actual - range);
            const max = actual + range;
            alert(`💡 提示：卡路里在 ${min} - ${max} 之间`);
        });
        elements.modalNewGame.addEventListener('click', () => {
            elements.modal.classList.add('hidden');
            startNewGame();
        });
        elements.modal.addEventListener('click', (e) => {
            if (e.target === elements.modal) {
                elements.modal.classList.add('hidden');
            }
        });

        // Start game
        startNewGame();
    </script>
