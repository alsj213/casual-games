<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>卡路里猜猜看 - Casual Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
        }
        
        .food-image {
            transition: transform 0.3s ease;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .food-image-container {
            aspect-square;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .food-image:hover {
            transform: scale(1.02);
        }
        
        .category-tag {
            transition: all 0.2s ease;
        }
        
        .category-tag.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgb(255, 255, 255);
            transform: scale(1.05);
        }
        
        .calorie-input::-webkit-inner-spin-button,
        .calorie-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .calorie-input {
            -moz-appearance: textfield;
        }
        
        .result-item {
            animation: slideIn 0.2s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <div class="container mx-auto px-4 py-6 max-w-md">

        </div>

        <!-- Category Selection -->
        <div id="category-selection" class="mb-4">

                <div class="grid grid-cols-2 gap-2" id="category-buttons">
                    <!-- Category buttons -->
                </div>
                <div class="mt-3 text-center text-green-100 text-sm">
                    最高分: <span id="category-high-score" class="font-bold text-yellow-300">0</span>
                </div>
            </div>
        </div>

        <!-- Main Game Area -->
        <div id="game-area" class="bg-white/10 backdrop-blur-lg rounded-2xl p-5 shadow-xl mb-4" style="display: none;">
            <div class="mb-4">
                <h2 id="food-name" class="text-xl font-semibold mb-3 text-center text-white"></h2>
                <div class="aspect-square bg-white/20 rounded-xl overflow-hidden flex items-center justify-center">
                    <img id="food-image" class="food-image w-full h-full object-contain bg-white p-2 rounded">
                </div>
            </div>
            
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-green-100 text-sm">当前得分</span>
                    <span id="current-score" class="text-yellow-300 font-bold text-xl">0</span>
                </div>
                <div class="w-full bg-white/20 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-yellow-400 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-green-100 text-sm mb-2">输入你的猜测 (卡路里 kcal)</label>
                <div class="flex gap-2">
                    <input type="number" id="calorie-input" placeholder="输入卡路里" 
                           class="calorie-input flex-1 px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-green-200 focus:outline-none focus:border-yellow-400">
                    <button id="guess-btn" class="px-6 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-semibold text-gray-900 hover:opacity-90 transition-opacity">
                        猜测
                    </button>
                </div>
                <p id="hint-text" class="text-sm mt-2 text-center"></p>
            </div>

            <div id="result-card" class="mb-4 p-4 bg-white/15 rounded-xl hidden result-item">
                <h3 class="text-white font-semibold mb-2">正确答案</h3>
                <div class="space-y-1 text-green-100 text-sm">
                    <p>🍽️ 食物: <span id="result-name" class="font-bold text-white"></span></p>
                    <p>🔥 卡路里: <span id="result-calories" class="font-bold text-yellow-300"></span> kcal</p>
                    <p>📊 你的误差: <span id="result-error" class="font-bold text-yellow-300"></span>%</p>
                    <p>✅ 本局得分: <span id="result-score" class="font-bold text-green-300"></span></p>
                    <p id="result-note" class="text-xs italic mt-2"></p>
                </div>
            </div>

            <div>
                <div class="text-green-100 text-sm mb-2">历史猜测</div>
                <div id="guess-history" class="space-y-2 max-h-32 overflow-y-auto"></div>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="hint-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-semibold text-gray-900 hover:opacity-90 transition-opacity">
                💡 获取提示
            </button>
            <button id="next-food-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold text-white hover:opacity-90 transition-opacity">
                ➡️ 下一题
            </button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-8 max-w-sm w-full text-center">
            <div id="modal-icon" class="text-6xl mb-4"></div>
            <h2 id="modal-title" class="text-2xl font-bold mb-2 text-white"></h2>
            <p id="modal-message" class="text-gray-300 mb-6"></p>
            <div class="flex gap-2">

                    下一题
                </button>
            </div>

    </div>

                name: "🥤 饮料酒水",
                foods: [
                    { name: "可口可乐 一罐 (330ml)", calories: 142, note: "都是添加糖，热量全来自糖" },
                    { name: "百事可乐 一罐 (330ml)", calories: 143, note: "和可口可乐差不多" },
                    { name: "雪碧 一罐 (330ml)", calories: 143, note: "无糖雪碧零卡路里" },
                    { name: "零度可乐 一罐", calories: 0, note: "甜味剂代替糖，零卡路里" },
                    { name: "无糖雪碧 一罐", calories: 0, note: "零度可乐一样" },
                    { name: "橙汁 一杯 (250ml)", calories: 112, note: "就算纯果汁也有很多糖" },
                    { name: "苹果汁 一杯 (250ml)", calories: 117, note: "和橙汁差不多" },
                    { name: "矿泉水 一瓶 (500ml)", calories: 0, note: "零卡路里，最健康" },
                    { name: "珍珠奶茶 中杯", calories: 350, name: "珍珠加糖热量很高" },
                    { name: "美式咖啡 一杯", calories: 5, note: "黑咖啡几乎零卡路里" },
                    { name: "拿铁咖啡 一杯", calories: 150, name: "加了牛奶，热量不算高" },
                    { name: "卡布奇诺 一杯", calories: 120, note: "奶泡多奶少，热量比拿铁低" },
                    { name: "摩卡 一杯", calories: 190, note: "加了巧克力酱，热量更高" },
                    { name: "冰红茶 一瓶", calories: 100, note: "茶加糖，热量不算低" },
                    { name: "绿茶 一杯", calories: 2, note: "无糖茶几乎零卡路里" },
                    { name: "啤酒 一瓶 (500ml)", calories: 160, note: "液体面包，热量不算低" },
                    { name: "白酒 一杯 (50ml)", calories: 140, note: "酒精热量很高，接近油脂" },
                    { name: "红酒 一杯 (150ml)", calories: 120, note: "酒精热量，比白酒稍低" },
                    { name: "威士忌 一杯 (50ml)", calories: 110, note: "蒸馏酒度数高热量高" },
                    { name: "气泡水 一瓶", calories: 0, note: "无糖零卡，健康" },
                    { name: "柠檬水 一杯", calories: 120, note: "加了很多糖，热量不低" },
                    { name: "无糖柠檬水 一杯", calories: 5, note: "几乎零卡路里" }
                ]
            }
        };

        let gameState = {
            currentCategory: null,
            currentFood: null,
            guessed: [],
            totalScore: 0,
            questionCount: 0
        };

        const elements = {
            categoryButtons: document.getElementById('category-buttons'),
            categoryHighScore: document.getElementById('category-high-score'),
            categorySelection: document.getElementById('category-selection'),
            gameArea: document.getElementById('game-area'),
            foodName: document.getElementById('food-name'),
            foodImage: document.getElementById('food-image'),
            currentScore: document.getElementById('current-score'),
            progressBar: document.getElementById('progress-bar'),
            calorieInput: document.getElementById('calorie-input'),
            guessBtn: document.getElementById('guess-btn'),
            guessHistory: document.getElementById('guess-history'),
            hintText: document.getElementById('hint-text'),
            resultCard: document.getElementById('result-card'),
            resultName: document.getElementById('result-name'),
            resultCalories: document.getElementById('result-calories'),
            resultError: document.getElementById('result-error'),
            resultScore: document.getElementById('result-score'),
            resultNote: document.getElementById('result-note'),
            hintBtn: document.getElementById('hint-btn'),
            nextFoodBtn: document.getElementById('next-food-btn'),
            modal: document.getElementById('modal'),
            modalIcon: document.getElementById('modal-icon'),
            modalTitle: document.getElementById('modal-title'),
            modalMessage: document.getElementById('modal-message'),
            modalNextFood: document.getElementById('modal-next-food')
        };

        // Load high score from localStorage
        function loadHighScore(category) {
            const key = 'calorie-guesser-' + category;
            const saved = localStorage.getItem(key);
            return saved ? parseInt(saved) : 0;
        }

        function saveHighScore(category, score) {
            const key = 'calorie-guesser-' + category;
            const current = loadHighScore(category);
            if (score > current) {
                localStorage.setItem(key, score.toString());
                return true;
            }
            return false;
        }

        // Initialize category buttons
        function initCategories() {
            for (const key in foodDB) {
                const btn = document.createElement('button');
                btn.className = 'category-tag px-4 py-2 bg-white/15 border border-white/30 rounded-lg text-white font-semibold hover:bg-white/25 transition-colors';
                btn.textContent = foodDB[key].name;
                btn.dataset.category = key;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-tag').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    startCategory(key);
                });
                elements.categoryButtons.appendChild(btn);
            }
            // Click first category by default
            const firstBtn = elements.categoryButtons.querySelector('button');
            if (firstBtn) {
                firstBtn.click();
            }
        }

        function startCategory(category) {
            gameState.currentCategory = category;
            gameState.totalScore = 0;
            gameState.questionCount = 0;
            const highScore = loadHighScore(category);
            elements.categoryHighScore.textContent = highScore;
            elements.categorySelection.style.display = 'block';
            elements.gameArea.style.display = 'block';
            nextQuestion();
            updateUI();
        }

        function nextQuestion() {
            const foods = foodDB[gameState.currentCategory].foods;
            const randomIndex = Math.floor(Math.random() * foods.length);
            gameState.currentFood = foods[randomIndex];
            gameState.guessed = [];
            elements.resultCard.classList.add('hidden');
            elements.calorieInput.value = '';
            elements.guessHistory.innerHTML = ''';
            updateUI();
            elements.calorieInput.focus();
        }

        function updateUI() {
            elements.foodName.textContent = gameState.currentFood.name;
            elements.currentScore.textContent = gameState.totalScore.toFixed(0);
            const foods = foodDB[gameState.currentCategory].foods;
            const progress = (gameState.questionCount / foods.length) * 100;
            elements.progressBar.style.width = progress + '%';
            // Fallback for image
            elements.foodImage.onerror = function() {
                this.style.display = 'none';
                this.parentElement.style.backgroundColor = 'rgba(255,255,255,0.2)';
                const text = document.createElement('div');
                text.className = 'text-white text-5xl';
                text.textContent = '🍽️';
                this.parentElement.appendChild(text);
            };
        }

        function addGuessToList(guess, actual) {
            const error = Math.abs(guess - actual) / actual * 100;
            let className = '';
            let text = '';
            if (guess > actual) {
                className = 'bg-orange-500/20 border border-orange-500, 50];
                text = '🔽 猜高了';
            } else {
                className = 'bg-blue-500/20 border border-blue-500/50';
                text = '🔼 猜低了';
            }
            const guessDiv = document.createElement('div');
            guessDiv.className = `guess-item px-4 py-3 rounded-lg flex items-center justify-between ${className}`;
            guessDiv.innerHTML = `
                <span class="font-semibold text-white">${guess} kcal</span>
                <span class="text-sm ${text.includes('猜高') ? 'text-orange-300' : 'text-blue-300'}">${text}</span>
            `;
            elements.guessHistory.insertBefore(guessDiv, elements.guessHistory.firstChild);
        }

        function calculateScore(guess, actual) {
            // 相对误差评分：误差 0% = 100分，误差 100% = 0分，误差 > 100% = 0分
            const error = Math.abs(guess - actual) / actual;
            const score = Math.max(0, 100 - error * 100);
            return score;
        }

        function handleGuess() {
            const inputVal = elements.calorieInput.value.trim();
            if (!inputVal) {
                elements.hintText.textContent = '⚠️ 请输入卡路里';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            const guess = parseInt(inputVal);
            if (isNaN(guess) || guess < 0 || guess > 5000) {
                elements.hintText.textContent = '⚠️ 请输入有效的卡路里 (0-5000)';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            // 检查是否已经猜过这个数字
            if (gameState.guessed.includes(guess)) {
                elements.hintText.textContent = '⚠️ 你已经猜过这个数字了';
                elements.hintText.className = 'text-yellow-300 text-sm mt-2 text-center';
                return;
            }

            gameState.guessed.push(guess);
            const actual = gameState.currentFood.calories;
            const actualScore = calculateScore(guess, actual);
            gameState.totalScore += actualScore;
            gameState.questionCount++;

            if (guess === actual) {
                elements.hintText.textContent = '🎉 完全猜对了！';
                elements.hintText.className = 'text-green-300 text-sm mt-2 text-center';
            } else if (guess > actual) {
                elements.hintText.textContent = '🔽 太高了';
                elements.hintText.className = 'text-orange-300 text-sm mt-2 text-center';
                addGuessToList(guess, actual);
            } else {
                elements.hintText.textContent = '🔼 太低了';
                elements.hintText.className = 'text-blue-300 text-sm mt-2 text-center';
                addGuessToList(guess, actual);
            }

            // Show result card
            showResult();
        }

        function showResult() {
            const guess = parseInt(elements.calorieInput.value);
            const actual = gameState.currentFood.calories;
            const error = Math.abs(guess - actual) / actual * 100;
            const score = calculateScore(guess, actual);

            elements.resultName.textContent = gameState.currentFood.name;
            elements.resultCalories.textContent = actual;
            elements.resultError.textContent = error.toFixed(1);
            elements.resultScore.textContent = score.toFixed(1);
            if (gameState.currentFood.note) {
                elements.resultNote.textContent = '💡 ' + gameState.currentFood.note;
            } else {
                elements.resultNote.textContent = '';
            }
            elements.resultCard.classList.remove('hidden');
            elements.currentScore.textContent = gameState.totalScore.toFixed(0);
        }

        function showFinalModal() {
            const foods = foodDB[gameState.currentCategory].foods;
            if (gameState.questionCount >= foods.length) {
                // All questions done
                const finalScore = gameState.totalScore / foods.length;
                const isNewHigh = saveHighScore(gameState.currentCategory, finalScore);
                elements.modal.classList.remove('hidden');
                elements.modalIcon.textContent = '🏆';
                elements.modalTitle.textContent = '分类挑战完成！';
                let message = `你总共答对了 ${gameState.questionCount} 题\n平均得分: ${finalScore.toFixed(1)} / 100`;
                if (isNewHigh) {
                    message += '\n🎉 恭喜！打破了你的最高分记录！';
                    elements.categoryHighScore.textContent = finalScore.toFixed(0);
                }
                elements.modalMessage.textContent = message;
            } else {
                if (guess === actual) {
                    elements.modal.classList.remove('hidden');
                    elements.modalIcon.textContent = '🎉';
                    elements.modalTitle.textContent = '完美答对！';
                    elements.modalMessage.textContent = `完全命中正确答案 ${actual} kcal\n得分: ${score.toFixed(1)}`;
                }
            }
        }

        function giveHint() {
            const actual = gameState.currentFood.calories;
            // 提示：范围是 actual ± 25%
            const min = Math.floor(actual * 0.75);
            const max = Math.ceil(actual * 1.25);
            alert(`💡 提示：卡路里在 ${min} - ${max} kcal 之间`);
        }

        // Event bindings
        elements.guessBtn.addEventListener('click', handleGuess);
        elements.calorieInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleGuess();
            }
        });
        elements.hintBtn.addEventListener('click', giveHint);
        elements.nextFoodBtn.addEventListener('click', () => {
            nextQuestion();
        });
        elements.modalNextFood.addEventListener('click', () => {
            elements.modal.classList.add('hidden');
            nextQuestion();
        });
        elements.modal.addEventListener('click', (e) => {
            if (e.target === elements.modal) {
                elements.modal.classList.add('hidden');
            }
        });

        // Start the game
        initCategories();
</script>
</body>
</html>
