<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字接龙 - Text Solitaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 95vw;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }
        .info-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .info-item span {
            color: #f9e79f;
            margin-left: 4px;
        }
        .word-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            justify-content: flex-start;
            border: 2px solid #e9ecef;
        }
        .word-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #adb5bd;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 18px;
            font-weight: bold;
            color: #495057;
            display: inline-block;
            transition: all 0.2s;
            cursor: pointer;
        }
        .word-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .word-card.placed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        .stock-area {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .stock-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-align: left;
        }
        .stock-cards {
            display: flex;
            flex-wrap: wrap;
            gap: -20px;
        }
        .stock-card {
            width: 50px;
            height: 70px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            border: 2px solid #1b5e20;
            border-radius: 8px;
            margin-left: -20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }
        .stock-card:hover {
            transform: translateY(-8px);
            z-index: 10;
        }
        .stock-card.empty {
            background: #e0e0e0;
            border: 2px dashed #bdbdbd;
            color: #9e9e9e;
            cursor: default;
        }
        .stock-card.empty:hover {
            transform: none;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        #wordInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        #wordInput:focus {
            border-color: #667eea;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            font-size: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #a8edea 0%, #fed6ab 100%);
            color: #333;
        }
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .game-over.active {
            display: flex;
        }
        .result-modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
        }
        .result-modal h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .result-stats {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .instructions {
            color: #666;
            font-size: 13px;
            text-align: left;
            line-height: 1.6;
            margin-top: 10px;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            justify-content: center;
        }
        .suggestion-tag {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #c8e6c9;
            transition: all 0.2s;
        }
        .suggestion-tag:hover {
            background: #2e7d32;
            color: white;
        }
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
        }
        .message.show {
            opacity: 1;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }
            .stock-card {
                width: 40px;
                height: 56px;
                font-size: 14px;
            }
            .word-card {
                padding: 8px 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🀄️ 文字接龙</h1>
        <p class="subtitle">上一个词尾字 → 下一个词首字，传统汉字接龙，单人休闲玩法</p>
        
        <div class="info-bar">
            <div class="info-item">已接龙: <span id="placedCount">0</span></div>
            <div class="info-item">剩余牌: <span id="remainingCount">0</span></div>
            <div class="info-item">最长接龙: <span id="bestScore">0</span></div>
        </div>

        <div class="word-area" id="wordArea">
            <!-- Placed words will go here -->
        </div>

        <div class="stock-area">
            <div class="stock-title">剩余手牌 (点击发牌):</div>
            <div class="stock-cards" id="stockCards">
                <!-- Stock cards will go here -->
            </div>
        </div>

        <div class="suggestions" id="suggestions">
            <!-- Auto suggestions -->
        </div>

        <div class="input-area">
            <input type="text" id="wordInput" placeholder="在此输入你接的词..." maxlength="4">
            <button class="btn btn-primary" onclick="submitWord">提交</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="startNewGame()">新游戏</button>
            <button class="btn btn-secondary" onclick="showHint()">提示</button>
        </div>

        <p class="instructions">
            <strong>玩法规则：</strong><br>
            1. 点击左侧牌堆发牌，获得一个词<br>
            2. 你的词需要满足：<strong>首字 = 上个词的尾字</strong><br>
            3. 成功接龙后词放到接龙区，继续接下一个<br>
            4. 接不上可以重新发牌（机会有限）<br>
            5. 尽量多接龙，挑战最长记录！
        </p>
    </div>

    <div class="game-over" id="gameOver">
        <div class="result-modal">
            <h2>🎮 游戏结束</h2>
            <div class="result-stats" id="resultStats"></div>
            <button class="btn btn-primary" onclick="startNewGame()">再玩一局</button>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        // 常用成语词汇库 - 按字数分类
        const WORDS = [
            // 两字词
            "爱情", "爱护", "爱心", "爱国", "安心", "安静", "安全", "案件", "暗号", "按照", "按摩",
            "白云", "白菜", "白纸", "白天", "白雪", "白领", "百度", "摆动", "班级", "办公",
            "帮忙", "包子", "包装", "宝贝", "保护", "报纸", "暴雨", "爆炸", "北方", "背诵",
            "比赛", "笔记", "必须", "变化", "便利", "编号", "表达", "冰川", "饼干", "玻璃",
            "补充", "不变", "餐厅", "菜单", "操作", "草地", "草莓", "长城", "城市", "乘客",
            "翅膀", "出生", "春风", "春雨", "春天", "磁铁", "村庄", "大海", "大树", "大门",
            "地图", "地铁", "电工","电视", "电影", " Elec", "短信", "锻炼", "对称", "俄罗斯",
            "发烧", "发财", "方便", "飞行", "非常", "芬芳", "分开", "风暴", "粉丝", "风景",
            "蜂蜜", "奉献", "锋利", "父母", "改进", "干净", "感觉", "感谢", "高山", "告诉",
            "公园", "孤单", "顾客", "故事", "光明", "光盘", "广州", "国人", "苹果", "果汁",
            "海军", "海鲜", "汉字", "好处", "红茶", "黑板", "红旗", "华为", "火车", "火星",
            "鸡蛋", "激光", "寂寞", "家乡", "价格", "坚强", "建筑", "江南", "交换", "脚步",
            "咖啡", "开发", "开心", "科技", "快递", "快乐", "蜡烛", "蓝天", "老板", "雷达",
            "冷冻", "理发", "力度", "莲花", "聊天", "猎人", "榴莲", "旅行", "绿色", "妈妈",
            "麻雀", "玫瑰", "美食", "妹妹", "梦想", "迷惑", "米饭", "蜜蜂", "棉花", "面对",
            "明天", "明白", "母亲", "奶茶", "南方", "宁夏", "牛奶", "农民", "女儿", "偶尔",
            "爬山", "拍卖", "旁边", "派对", "苹果", "品牌", "平静", "苹果", "葡萄", "瀑布",
            "奇怪", "汽车", "牵挂", "巧克力", "青春", "秋天", "区别", "日出", "日历", "容光",
            "色彩", "沙漠", "山水", "闪电", "生日", "绳子", "书法", "水果", "睡觉", "思念",
            "泰山", "太阳", "天空", "天堂", "甜蜜", "跳舞", "统一", "头发", "土豆", "推荐",
            "温暖", "微风", "文化", "文明", "我们", "问候", "武汉", "西安", "夕阳", "希望",
            "喜欢", "洗澡", "夏天", "鲜花", "天空", "夏天", "校园", "心情", "星光", "熊猫",
            "雪花", "学生", "寻找", "血压", "烟花", "燕子", "眼睛", "阳光", "氧气", "叶子",
            "一起", "已经", "因为", "音乐","银行", "银杏", "影子","春雨", "拥抱","游戏",
            "右边", "雨天", "月光", "阅读", "运动", "再见", "早上","怎么","长城","哲学",
            "支票", "蜘蛛", "智慧", "中国", "足球", "左边", "做人", "座位", "爱情", "爱国",
            // 三字词
            "天安门", "奥运会", "奥特曼", "白云山", "百家姓", "笔记本", "停车场", "出租车",
            "电影院", "动物园", "发动机", "方便面", "高压锅", "过山车", "红绿灯", "红外线",
            "九寨沟", "计算机", "金字塔", "俱乐部", "龙卷风", "毛毛虫", "摩天轮", "摩托车",
            "内蒙古", "摩天轮", "巧克力", "企鹅岛", "清华大学", "天气预报", "维生素",
            "卫生间", "微波炉", "吸尘器", "喜马拉雅", "新疆舞", "银杏树", "幼儿园", "元宵节",
            "演唱会", "中秋节", "自行车", "打字机", "蜘蛛网", "Z", "天安门",
            // 四字词 (成语)
            "一模一样", "二话不说", "三心二意", "四面八方", "五光十色", "六六大顺", "七上八下",
            "八面玲珑", "九牛一毛", "十全十美", "百发百中", "千方百计", "万无一失", "天长地久",
            "春夏秋冬", "天南地北", "山高水长", "风花雪月", "花好月圆", "月圆花好", "自言自语",
            "自娱自乐", "心安理得", "得不偿失", "失魂落魄",魄散魂飞", "飞来横祸", "祸从口出",
            "出生入死", "死里逃生", "生生不息", "息息相关", "关门打狗", "狗急跳墙", "墙面有土",
            "土生土长", "长驱直入", "入不敷出", "出生入死", "龙腾虎跃", "跃马扬刀", "刀山火海",
            "海阔天空", "空穴来风", "风调雨顺", "顺手牵羊", "羊肠小道", "道听途说", "说三道四",
            "四面楚歌", "歌舞升平", "平平安安", "安居乐业", "业精于勤", "勤能补拙", "拙嘴笨舌",
            "舌尖上中国", "绿水青山", "山清水秀", "秀丽江山", "江河湖海", "海纳百川", "川流不息",
            "息息相关", "息息相通", "通情达理", "理直气壮", "壮志凌云", "云开雾散", "散兵游勇",
            "勇往直前", "前赴后继", "继往开来", "来日方长", "长命百岁","岁岁平安", "安安稳稳"
        ];

        // Game state
        let placedWords = [];
        let stockWords = [];
        let currentWord = null;
        let placedCount = 0;
        let remainingDraws = 10;
        let bestScore = parseInt(localStorage.getItem('wordSolitaireBest') || '0');
        let gameOver = false;

        // DOM elements
        const wordAreaEl = document.getElementById('wordArea');
        const stockCardsEl = document.getElementById('stockCards');
        const suggestionsEl = document.getElementById('suggestions');
        const placedCountEl = document.getElementById('placedCount');
        const remainingCountEl = document.getElementById('remainingCount');
        const bestScoreEl = document.getElementById('bestScore');
        const wordInput = document.getElementById('wordInput');
        const gameOverEl = document.getElementById('gameOver');
        const resultStatsEl = document.getElementById('resultStats');
        const messageEl = document.getElementById('message');

        // Initialize
        document.getElementById('bestScore').textContent = bestScore;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startNewGame() {
            placedWords = [];
            placedCount = 0;
            gameOver = false;
            stockWords = shuffle([...WORDS]);
            remainingDraws = stockWords.length > 20 ? 10 : stockWords.length;
            currentWord = null;
            wordAreaEl.innerHTML = '';
            wordInput.value = '';
            suggestionsEl.innerHTML = '';
            gameOverEl.classList.remove('active');
            updateStats();
            renderStock();
            if (stockWords.length > 0) {
                drawWord();
            }
        }

        function updateStats() {
            placedCountEl.textContent = placedCount;
            remainingCountEl.textContent = remainingDraws;
            bestScoreEl.textContent = bestScore;
        }

        function renderStock() {
            stockCardsEl.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const card = document.createElement('div');
                if (i < stockWords.length) {
                    card.className = 'stock-card';
                    card.textContent = '?';
                    card.onclick = drawWord;
                } else {
                    card.className = 'stock-card empty';
                }
                stockCardsEl.appendChild(card);
            }
        }

        function drawWord() {
            if (gameOver) return;
            if (remainingDraws <= 0) {
                showMessage('没有剩余发牌机会了！');
                endGame();
                return;
            }
            if (stockWords.length === 0) {
                showMessage('没有牌了，游戏结束！');
                endGame();
                return;
            }
            currentWord = stockWords.pop();
            remainingDraws--;
            updateSuggestions();
            renderStock();
            updateStats();
            showMessage(`发牌: ${currentWord}`);
        }

        function getLastChar(word) {
            // Remove any whitespace
            word = word.trim();
            // Return last character
            return word[word.length - 1];
        }

        function getFirstChar(word) {
            word = word.trim();
            return word[0];
        }

        function wordExists(word) {
            return placedWords.some(p => p.toLowerCase() === word.toLowerCase());
        }

        function updateSuggestions() {
            if (!currentWord) return;
            const lastChar = getLastChar(currentWord);
            const suggestions = WORDS.filter(w => 
                getFirstChar(w) === lastChar && !wordExists(w)
            ).slice(0, 6);
            
            suggestionsEl.innerHTML = '';
            suggestions.forEach(w => {
                const tag = document.createElement('div');
                tag.className = 'suggestion-tag';
                tag.textContent = w;
                tag.onclick = () => {
                    wordInput.value = w;
                    submitWord();
                };
                suggestionsEl.appendChild(tag);
            });
        }

        function submitWord() {
            if (gameOver) return;
            if (!currentWord) {
                showMessage('请先点击牌堆发牌！');
                return;
            }
            let inputWord = wordInput.value.trim();
            if (inputWord.length === 0) {
                showMessage('请输入词语！');
                return;
            }

            // Check rule: first char === last char of currentWord
            const requiredFirst = getLastChar(currentWord);
            const inputFirst = getFirstChar(inputWord);
            
            if (inputFirst !== requiredFirst) {
                showMessage(`错误！第一个字必须是"${requiredFirst}"`);
                return;
            }

            if (wordExists(inputWord)) {
                showMessage('这个词已经用过了！');
                return;
            }

            // Valid word - place it
            placedWords.push(inputWord);
            placedCount++;
            currentWord = inputWord;

            // Add to DOM
            const wordEl = document.createElement('div');
            wordEl.className = 'word-card placed';
            wordEl.textContent = inputWord;
            wordAreaEl.appendChild(wordEl);

            // Clear input
            wordInput.value = '';
            updateSuggestions();
            updateStats();

            // Check if we have any words left
            if (stockWords.length === 0 && remainingDraws === 0) {
                endGame();
            } else {
                showMessage(`接龙成功: ${inputWord}`);
            }
        }

        function endGame() {
            gameOver = true;
            if (placedCount > bestScore) {
                bestScore = placedCount;
                localStorage.setItem('wordSolitaireBest', bestScore);
            }
            let resultText = `
                总共接龙: <strong>${placedCount}</strong> 个词语<br>
                最高记录: <strong>${bestScore}</strong>
            `;
            resultStats.innerHTML = resultText;
            gameOverEl.classList.add('active');
        }

        function showHint() {
            if (!currentWord) {
                showMessage('请先发牌才能提示');
                return;
            }
            updateSuggestions();
            const lastChar = getLastChar(currentWord);
            showMessage(`提示: 需要第一个字是 "${lastChar}" 的词语，上面点击快速选择`);
        }

        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 2000);
        }

        function resetGame() {
            startNewGame();
        }

        // Handle enter key
        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitWord();
            }
        });

        // Start game
        startNewGame();
    </script>
</body>
</html>
