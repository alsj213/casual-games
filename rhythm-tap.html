<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>节奏点击游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: Arial, sans-serif;
        }
        #game-container { position: relative; }
        #gameCanvas { 
            border: 4px solid #fff; border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #score-display {
            position: absolute; top: 10px; left: 10px;
            color: #fff; font-size: 20px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #lives-display {
            position: absolute; top: 10px; right: 10px;
            color: #ff4444; font-size: 24px;
        }
        #combo-display {
            position: absolute; top: 40px; right: 10px;
            color: #ffcc00; font-size: 18px; font-weight: bold;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 48px; font-weight: bold;
            text-align: center; display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="score-display">得分: <span id="score">0</span></div>
        <div id="lives-display">❤❤❤</div>
        <div id="combo-display"></div>
        <div id="game-over">
            游戏结束!<br>
            <span style="font-size: 24px;">点击重新开始</span>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const targetZone = { x: 150, y: 480, w: 100, h: 80 };
        
        let dots = [], score = 0, lives = 3, combo = 0, gameOver = false;
        let lastSpawn = 0, spawnRate = 1000;
        
        function spawnDot() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
            dots.push({
                x: 150 + Math.random() * 100,
                y: -30,
                radius: 25 + Math.random() * 10,
                speed: 2 + Math.random() * 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                clicked: false
            });
        }
        
        function drawTargetZone() {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(targetZone.x, targetZone.y, targetZone.w, targetZone.h);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.strokeRect(targetZone.x, targetZone.y, targetZone.w, targetZone.h);
            ctx.fillStyle = '#fff';
            ctx.fillText('点击区域!', targetZone.x + 20, targetZone.y + 45);
        }
        
        function draw() {
            ctx.clearRect(0, 0, W, H);
            drawTargetZone();
            
            dots.forEach(dot => {
                if (dot.clicked) return;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                ctx.fillStyle = dot.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        function update(timestamp) {
            if (gameOver) return;
            
            if (timestamp - lastSpawn > spawnRate) {
                spawnDot();
                lastSpawn = timestamp;
                spawnRate = Math.max(400, spawnRate - 10);
            }
            
            dots.forEach(dot => {
                if (dot.clicked) return;
                dot.y += dot.speed;
                
                if (dot.y > H + 30) {
                    dot.clicked = true;
                    combo = 0;
                    lives--;
                    updateDisplay();
                    if (lives <= 0) endGame();
                }
            });
            
            dots = dots.filter(dot => !dot.clicked || dot.y <= H + 30);
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives-display').textContent = '❤'.repeat(lives);
            document.getElementById('combo-display').textContent = combo > 1 ? `连击: ${combo}` : '';
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
        }
        
        function restartGame() {
            dots = []; score = 0; lives = 3; combo = 0;
            gameOver = false; spawnRate = 1000;
            document.getElementById('game-over').style.display = 'none';
            updateDisplay();
        }
        
        canvas.addEventListener('click', (e) => {
            if (gameOver) {
                restartGame();
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            let hit = false;
            dots.forEach(dot => {
                if (dot.clicked) return;
                const dist = Math.sqrt((mouseX - dot.x) ** 2 + (mouseY - dot.y) ** 2);
                if (dist < dot.radius + 10 &&
                    mouseY > targetZone.y && mouseY < targetZone.y + targetZone.h) {
                    dot.clicked = true;
                    hit = true;
                    score += 10 + combo * 2;
                    combo++;
                    updateDisplay();
                }
            });
            
            if (!hit) {
                combo = 0;
                updateDisplay();
            }
        });
        
        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop(0);
    </script>
</body>
</html>
