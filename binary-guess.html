<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二进制猜数字 - 位运算解谜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #94a3b8;
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        /* 难度选择 */
        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .diff-item {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #475569;
            border-radius: 12px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .diff-item:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        
        .diff-item.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }
        
        .diff-bits {
            color: #f1f5f9;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .diff-name {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .tutorial-card {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .tutorial-title {
            color: #3b82f6;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .tutorial-text {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .btn-start {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 游戏界面 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .btn-back {
            background: #475569;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            background: #64748b;
        }
        
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            color: #f1f5f9;
            font-size: 20px;
            font-weight: 600;
        }
        
        /* 二进制网格 */
        .binary-grid {
            display: grid;
            gap: 4px;
            margin-bottom: 16px;
            justify-content: center;
        }
        
        .bit-cell {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            cursor: default;
            transition: all 0.2s;
        }
        
        .bit-cell.bit-0 {
            background: rgba(30, 41, 59, 0.8);
            color: #94a3b8;
            border: 2px solid #475569;
        }
        
        .bit-cell.bit-1 {
            background: rgba(59, 130, 246, 0.6);
            color: white;
            border: 2px solid #3b82f6;
        }
        
        .bit-cell.calculated {
            border-width: 3px;
            border-color: #10b981;
        }
        
        /* 计算结果 */
        .result-box {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .result-label {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .result-value {
            color: #f1f5f9;
            font-size: 32px;
            font-weight: 700;
        }
        
        /* 输入区域 */
        .input-area {
            margin-bottom: 16px;
        }
        
        .input-label {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .guess-input {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #475569;
            border-radius: 8px;
            padding: 12px 16px;
            color: #f1f5f9;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        
        .guess-input:focus {
            border-color: #3b82f6;
        }
        
        /* 数字键盘 */
        .num-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .num-key {
            aspect-ratio: 1;
            background: #475569;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .num-key:hover {
            background: #64748b;
        }
        
        .num-key:active {
            background: #3b82f6;
            transform: scale(0.95);
        }
        
        .num-key.wide {
            grid-column: span 2;
            aspect-ratio: auto;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(71, 85, 105, 0.4);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        
        /* 历史记录 */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .history-table th {
            background: rgba(15, 23, 42, 0.8);
            color: #94a3b8;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .history-table td {
            color: #f1f5f9;
            padding: 8px;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid rgba(71, 85, 105, 0.5);
        }
        
        .history-table .correct {
            color: #10b981;
            font-weight: 600;
        }
        
        .history-table .wrong {
            color: #ef4444;
        }
        
        /* 胜利弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 90vw;
            width: 400px;
        }
        
        .modal-title {
            color: #f1f5f9;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .modal-message {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .best-record {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #10b981;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .bit-cell {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            .container {
                padding: 16px;
            }
            .difficulty-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页/难度选择 -->
        <div id="start-screen" class="screen active">
            <h1>🔢 二进制猜数字</h1>
            <p class="subtitle">根据二进制网格，推理出对应的十进制数字，边玩边学位运算</p>
            
            <div class="tutorial-card">
                <div class="tutorial-title">📖 游戏规则</div>
                <div class="tutorial-text">
                    系统随机生成一个 N 位二进制数，每个格子显示一位（0 或 1）。<br>
                    按从上到下顺序读取二进制数，计算出对应的十进制数字填入答案。<br>
                    猜对了过关，猜错了会记录你猜过的数字，帮助你推理。<br>
                    不同位数对应不同难度，从 4 位入门到 8 位挑战！
                </div>
            </div>
            
            <div class="difficulty-grid">
                <div class="diff-item" data-bits="4">
                    <div class="diff-bits">4 位</div>
                    <div class="diff-name">入门 (0-15)</div>
                </div>
                <div class="diff-item" data-bits="5">
                    <div class="diff-bits">5 位</div>
                    <div class="diff-name">初级 (0-31)</div>
                </div>
                <div class="diff-item" data-bits="6">
                    <div class="diff-bits">6 位</div>
                    <div class="diff-name">中等 (0-63)</div>
                </div>
                <div class="diff-item" data-bits="8">
                    <div class="diff-bits">8 位</div>
                    <div class="diff-name">挑战 (0-255)</div>
                </div>
            </div>
            
            <button class="btn-start" id="btn-start-game" disabled>开始游戏</button>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <button class="btn-back" id="btn-back-menu">← 返回</button>
                <div></div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">位数 / 范围</div>
                    <div class="stat-value" id="current-diff"></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">猜测次数</div>
                    <div class="stat-value" id="guess-count">0</div>
                </div>
            </div>
            
            <div class="binary-grid" id="binary-grid"></div>
            
            <div class="result-box">
                <div class="result-label">二进制从上到下读取 → 计算十进制结果</div>
                <div class="result-value" id="calculated-result">0</div>
            </div>
            
            <div class="input-area">
                <div class="input-label">你的答案：</div>
                <input type="number" class="guess-input" id="guess-input" placeholder="输入十进制数字" min="0">
            </div>
            
            <div class="num-keyboard" id="num-keyboard">
                <!-- 动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="btn-clear">清空</button>
                <button class="btn btn-primary" id="btn-verify">验证答案</button>
            </div>
            
            <div id="history-container" style="display: none; margin-top: 16px;">
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>次数</th>
                            <th>猜测</th>
                            <th>结果</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 胜利弹窗 -->
        <div id="victory-modal" class="modal">
            <div class="modal-content">
                <div class="modal-title">🎉 恭喜猜对了！</div>
                <div class="modal-message" id="victory-message"></div>
                <div class="best-record" id="best-record" style="display: none;"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="btn-new-game">新游戏</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let selectedBits = null;
        let targetBinary = [];
        let targetNumber = 0;
        let guessCount = 0;
        let guessHistory = [];
        let bestRecords = JSON.parse(localStorage.getItem('binary-guess-best-records') || '{}');
        
        // 难度定义
        const DIFFICULTIES = {
            4: { bits: 4, name: '4位入门', min: 0, max: 15 },
            5: { bits: 5, name: '5位初级', min: 0, max: 31 },
            6: { bits: 6, name: '6位中等', min: 0, max: 63 },
            8: { bits: 8, name: '8位挑战', min: 0, max: 255 }
        };
        
        // 初始化难度选择
        function initDifficultySelect() {
            document.querySelectorAll('.diff-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.diff-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedBits = parseInt(item.dataset.bits);
                    document.getElementById('btn-start-game').disabled = false;
                });
            });
        }
        
        // 生成随机二进制
        function generateRandomBinary(bits) {
            const binary = [];
            for (let i = 0; i < bits; i++) {
                binary.push(Math.random() < 0.5 ? 0 : 1);
            }
            return binary;
        }
        
        // 二进制转十进制
        function binaryToNumber(binary) {
            let num = 0;
            for (let i = 0; i < binary.length; i++) {
                num = (num << 1) | binary[i];
            }
            return num;
        }
        
        // 开始新游戏
        function startNewGame() {
            if (!selectedBits) return;
            
            guessCount = 0;
            guessHistory = [];
            targetBinary = generateRandomBinary(selectedBits);
            targetNumber = binaryToNumber(targetBinary);
            
            renderBinaryGrid();
            updateCalculatedResult();
            updateStats();
            renderHistory();
            
            document.getElementById('guess-input').value = '';
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }
        
        // 渲染二进制网格
        function renderBinaryGrid() {
            const grid = document.getElementById('binary-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(1, ${40 + 4}px)`;
            
            targetBinary.forEach((bit, index) => {
                const cell = document.createElement('div');
                cell.className = `bit-cell bit-${bit}`;
                cell.textContent = bit;
                grid.appendChild(cell);
            });
        }
        
        // 更新计算结果显示
        function updateCalculatedResult() {
            // 用户可以自己计算，这里其实已经知道结果了，但游戏就是让用户算
            // 不过我们可以显示位数帮助用户确认
            const calc = binaryToNumber(targetBinary);
            document.getElementById('calculated-result').textContent = calc;
        }
        
        // 更新统计
        function updateStats() {
            const diff = DIFFICULTIES[selectedBits];
            document.getElementById('current-diff').textContent = `${selectedBits}位 (${diff.min}-${diff.max})`;
            document.getElementById('guess-count').textContent = guessCount;
        }
        
        // 渲染历史记录
        function renderHistory() {
            const container = document.getElementById('history-container');
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            if (guessHistory.length > 0) {
                container.style.display = 'block';
                guessHistory.forEach((guess, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${guess.number}</td>
                        <td class="${guess.correct ? 'correct' : 'wrong'}">${guess.correct ? '正确' : '错误'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                container.style.display = 'none';
            }
        }
        
        // 验证答案
        function verifyGuess() {
            const input = document.getElementById('guess-input');
            const guessNum = parseInt(input.value);
            
            if (isNaN(guessNum)) {
                alert('请输入有效的数字！');
                return;
            }
            
            const diff = DIFFICULTIES[selectedBits];
            if (guessNum < diff.min || guessNum > diff.max) {
                alert(`请输入 ${diff.min} 到 ${diff.max} 之间的数字！`);
                return;
            }
            
            guessCount++;
            const correct = guessNum === targetNumber;
            
            guessHistory.push({
                number: guessNum,
                correct: correct
            });
            
            updateStats();
            renderHistory();
            
            if (correct) {
                // 更新最佳记录
                const key = selectedBits.toString();
                const oldBest = bestRecords[key];
                if (!oldBest || guessCount < oldBest) {
                    bestRecords[key] = guessCount;
                    localStorage.setItem('binary-guess-best-records', JSON.stringify(bestRecords));
                    showVictory(true, oldBest ? oldBest : null);
                } else {
                    showVictory(false, null);
                }
            } else {
                input.value = '';
            }
        }
        
        // 显示胜利弹窗
        function showVictory(newBest, oldBest) {
            const modal = document.getElementById('victory-modal');
            const message = document.getElementById('victory-message');
            const bestDiv = document.getElementById('best-record');
            
            message.textContent = `你用了 ${guessCount} 次猜中了 ${targetNumber}，太棒了！`;
            
            if (newBest) {
                bestDiv.style.display = 'block';
                if (oldBest === null) {
                    bestDiv.textContent = `🏆 新纪录！这是你第一次挑战 ${selectedBits} 位！`;
                } else {
                    bestDiv.textContent = `🏆 新纪录！比之前的 ${oldBest} 次少了 ${oldBest - guessCount} 次！`;
                }
            } else {
                bestDiv.style.display = 'none';
            }
            
            modal.classList.add('active');
        }
        
        // 渲染数字键盘
        function renderNumKeyboard() {
            const keyboard = document.getElementById('num-keyboard');
            keyboard.innerHTML = '';
            
            // 数字 0-9
            for (let i = 1; i <= 9; i++) {
                const button = document.createElement('button');
                button.className = 'num-key';
                button.textContent = i;
                button.addEventListener('click', () => {
                    const input = document.getElementById('guess-input');
                    if (input.value.length < 4) {
                        input.value += i;
                    }
                });
                keyboard.appendChild(button);
            }
            
            // 0 + 清除
            const zero = document.createElement('button');
            zero.className = 'num-key';
            zero.textContent = '0';
            zero.addEventListener('click', () => {
                const input = document.getElementById('guess-input');
                if (input.value.length < 4) {
                    input.value += '0';
                }
            });
            keyboard.appendChild(zero);
            
            const backspace = document.createElement('button');
            backspace.className = 'num-key wide';
            backspace.textContent = '← 删除';
            backspace.addEventListener('click', () => {
                const input = document.getElementById('guess-input');
                input.value = input.value.slice(0, -1);
            });
            keyboard.appendChild(backspace);
        }
        
        // 绑定事件
        document.querySelectorAll('.diff-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.diff-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedBits = parseInt(item.dataset.bits);
                document.getElementById('btn-start-game').disabled = false;
            });
        });
        
        document.getElementById('btn-start-game').addEventListener('click', startNewGame);
        document.getElementById('btn-back-menu').addEventListener('click', () => {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        });
        
        document.getElementById('btn-clear').addEventListener('click', () => {
            document.getElementById('guess-input').value = '';
        });
        
        document.getElementById('btn-verify').addEventListener('click', verifyGuess);
        
        document.getElementById('btn-new-game').addEventListener('click', () => {
            document.getElementById('victory-modal').classList.remove('active');
            startNewGame();
        });
        
        // 回车验证
        document.getElementById('guess-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                verifyGuess();
            }
        });
        
        // 初始化
        initDifficultySelect();
        renderNumKeyboard();
    </script>
</body>
</html>
