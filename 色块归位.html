<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色块归位 - 滑动排序</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .difficulty-select {
            margin-bottom: 20px;
        }

        .difficulty-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .diff-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .diff-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .diff-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        #game-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #grid {
            display: grid;
            gap: 4px;
            background: #e0e0e0;
            padding: 4px;
            border-radius: 8px;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 14px;
        }

        .cell:hover {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .control-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
        }

        .overlay.show .modal {
            transform: scale(1);
        }

        .modal h2 {
            color: #667eea;
            margin-bottom: 16px;
        }

        .modal p {
            margin-bottom: 20px;
            color: #666;
        }

        .slide-animation {
            transition: transform 0.3s ease-out;
        }

        .best-score {
            margin-top: 10px;
            padding: 10px;
            background: #f0f8ff;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <h1>色块归位</h1>
    <p class="subtitle">滑动整行整列，让同色色块归位到同一区域</p>

    <div class="container">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">时间</div>
                <div class="stat-value" id="time">0</div>
            </div>
        </div>

        <div class="difficulty-select">
            <div class="difficulty-label">选择难度</div>
            <div class="difficulty-buttons">
                <button class="diff-btn active" data-size="3">3×3</button>
                <button class="diff-btn" data-size="4">4×4</button>
                <button class="diff-btn" data-size="5">5×5</button>
                <button class="diff-btn" data-size="6">6×6</button>
            </div>
        </div>

        <div id="game-container">
            <div id="grid"></div>
        </div>

        <div class="controls">
            <button class="control-btn" id="undo-btn">撤销</button>
            <button class="control-btn" id="new-game-btn">新游戏</button>
        </div>

        <div class="best-score" id="best-score" style="display: none;">
            当前最佳: <span id="best-time">--</span>
        </div>
    </div>

    <div class="overlay" id="success-overlay">
        <div class="modal">
            <h2>🎉 恭喜过关！</h2>
            <p>你在 <span id="final-moves">0</span> 步内完成了排序<br>用时 <span id="final-time">0</span> 秒</p>
            <button class="control-btn" id="play-again-btn">再玩一次</button>
        </div>
    </div>

    <script>
        // 颜色定义 - 每个颜色对应一个区域
        const colors = [
            '#ff4444', // 红
            '#44ff44', // 绿
            '#4444ff', // 蓝
            '#ffff44', // 黄
            '#ff44ff', // 紫
            '#44ffff'  // 青
        ];

        const colorNames = ['红', '绿', '蓝', '黄', '紫', '青'];

        let gameState = {
            size: 3,
            grid: [],
            moves: 0,
            startTime: 0,
            elapsedTime: 0,
            timerInterval: null,
            history: [],
            completed: false,
            isAnimating: false
        };

        let bestScores = JSON.parse(localStorage.getItem('colorSortBestScores') || '{}');

        const gridEl = document.getElementById('grid');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const successOverlay = document.getElementById('success-overlay');
        const bestScoreEl = document.getElementById('best-score');
        const bestTimeEl = document.getElementById('best-time');

        // 初始化游戏
        function initGame(size) {
            gameState.size = size;
            gameState.moves = 0;
            gameState.completed = false;
            gameState.history = [];
            gameState.isAnimating = false;

            // 生成可解谜题
            gameState.grid = generatePuzzle(size);
            saveHistory();

            // 开始计时
            startTimer();

            // 更新显示
            renderGrid();
            updateStats();
            updateBestScore();

            // 隐藏成功提示
            successOverlay.classList.remove('show');
        }

        // 从正确状态逆推生成可解谜题
        function generatePuzzle(size) {
            // 创建正确状态
            const grid = [];
            for (let row = 0; row < size; row++) {
                grid[row] = [];
                for (let col = 0; col < size; col++) {
                    // 对于 N x N，每行都是同一种颜色
                    grid[row][col] = row;
                }
            }

            // 随机打乱 N*size 次
            const shuffleCount = size * size * 4;
            for (let i = 0; i < shuffleCount; i++) {
                const isRow = Math.random() > 0.5;
                const index = Math.floor(Math.random() * size);
                const direction = Math.random() > 0.5 ? 1 : -1;

                if (isRow) {
                    slideRow(grid, index, direction, false);
                } else {
                    slideCol(grid, index, direction, false);
                }
            }

            return grid;
        }

        // 滑动整行
        function slideRow(grid, row, direction, save = true) {
            if (gameState.isAnimating) return false;

            const size = grid.length;
            const oldRow = [...grid[row]];
            if (direction === 1) {
                // 向右滑动：每个元素向右移，最后一个到第一个
                const last = oldRow[size - 1];
                for (let col = size - 1; col > 0; col--) {
                    grid[row][col] = oldRow[col - 1];
                }
                grid[row][0] = last;
            } else {
                // 向左滑动：每个元素向左移，第一个到最后一个
                const first = oldRow[0];
                for (let col = 0; col < size - 1; col++) {
                    grid[row][col] = oldRow[col + 1];
                }
                grid[row][size - 1] = first;
            }

            if (save && !arraysEqual(oldRow, grid[row])) {
                gameState.moves++;
                saveHistory();
                updateStats();
            }

            return !arraysEqual(oldRow, grid[row]);
        }

        // 滑动整列
        function slideCol(grid, col, direction, save = true) {
            if (gameState.isAnimating) return false;

            const size = grid.length;
            const oldCol = grid.map(row => row[col]);
            if (direction === 1) {
                // 向下滑动：每个元素向下移，最后一个到第一个
                const last = oldCol[size - 1];
                for (let row = size - 1; row > 0; row--) {
                    grid[row][col] = oldCol[row - 1];
                }
                grid[0][col] = last;
            } else {
                // 向上滑动：每个元素向上移，第一个到最后一个
                const first = oldCol[0];
                for (let row = 0; row < size - 1; row++) {
                    grid[row][col] = oldCol[row + 1];
                }
                grid[size - 1][col] = first;
            }

            if (save && !arraysEqual(oldCol, grid.map(row => row[col]))) {
                gameState.moves++;
                saveHistory();
                updateStats();
            }

            return !arraysEqual(oldCol, grid.map(row => row[col]));
        }

        // 比较数组是否相等
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        // 检查是否完成
        function checkComplete() {
            const size = gameState.size;
            for (let row = 0; row < size; row++) {
                const color = gameState.grid[row][0];
                for (let col = 1; col < size; col++) {
                    if (gameState.grid[row][col] !== color) {
                        return false;
                    }
                }
            }
            return true;
        }

        // 保存历史用于撤销
        function saveHistory() {
            const copy = gameState.grid.map(row => [...row]);
            gameState.history.push({
                grid: copy,
                moves: gameState.moves
            });
        }

        // 撤销
        function undo() {
            if (gameState.history.length <= 1) return;
            if (gameState.isAnimating) return;

            gameState.history.pop();
            const prev = gameState.history[gameState.history.length - 1];
            gameState.grid = prev.grid.map(row => [...row]);
            gameState.moves = prev.moves;

            renderGrid();
            updateStats();
        }

        // 渲染网格
        function renderGrid() {
            const size = gameState.size;
            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.innerHTML = '';

            const cellSize = Math.min(60, (window.innerWidth - 80) / size);
            gridEl.style.width = `${cellSize * size + 4 * (size + 1)}px`;

            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    const colorIndex = gameState.grid[row][col];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.backgroundColor = colors[colorIndex];
                    cell.textContent = colorNames[colorIndex];
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    // 添加箭头控制器 - 行两侧
                    if (col === 0) {
                        const leftArrow = document.createElement('div');
                        leftArrow.style.cssText = `
                            position: absolute;
                            left: -20px;
                            top: 50%;
                            transform: translateY(-50%);
                            font-size: 16px;
                            color: #667eea;
                            cursor: pointer;
                            font-weight: bold;
                        `;
                        leftArrow.textContent = '◀';
                        leftArrow.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (slideRow(gameState.grid, row, -1)) {
                                renderGrid();
                                checkAndFinish();
                            }
                        });
                        cell.style.position = 'relative';
                        cell.appendChild(leftArrow);
                    }
                    if (col === size - 1) {
                        const rightArrow = document.createElement('div');
                        rightArrow.style.cssText = `
                            position: absolute;
                            right: -20px;
                            top: 50%;
                            transform: translateY(-50%);
                            font-size: 16px;
                            color: #667eea;
                            cursor: pointer;
                            font-weight: bold;
                        `;
                        rightArrow.textContent = '▶';
                        rightArrow.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (slideRow(gameState.grid, row, 1)) {
                                renderGrid();
                                checkAndFinish();
                            }
                        });
                        cell.style.position = 'relative';
                        cell.appendChild(rightArrow);
                    }

                    // 列上下箭头
                    if (row === 0 && col === Math.floor(size / 2)) {
                        const upArrow = document.createElement('div');
                        upArrow.style.cssText = `
                            position: absolute;
                            top: -20px;
                            left: 50%;
                            transform: translateX(-50%);
                            font-size: 16px;
                            color: #667eea;
                            cursor: pointer;
                            font-weight: bold;
                        `;
                        upArrow.textContent = '▲';
                        upArrow.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (slideCol(gameState.grid, col, -1)) {
                                renderGrid();
                                checkAndFinish();
                            }
                        });
                        cell.style.position = 'relative';
                        cell.appendChild(upArrow);
                    }
                    if (row === size - 1 && col === Math.floor(size / 2)) {
                        const downArrow = document.createElement('div');
                        downArrow.style.cssText = `
                            position: absolute;
                            bottom: -20px;
                            left: 50%;
                            transform: translateX(-50%);
                            font-size: 16px;
                            color: #667eea;
                            cursor: pointer;
                            font-weight: bold;
                        `;
                        downArrow.textContent = '▼';
                        downArrow.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (slideCol(gameState.grid, col, 1)) {
                                renderGrid();
                                checkAndFinish();
                            }
                        });
                        cell.style.position = 'relative';
                        cell.appendChild(downArrow);
                    }

                    gridEl.appendChild(cell);
                }
            }

            // 添加触摸滑动支持
            addTouchSupport();
        }

        // 触摸滑动支持
        let touchStartX = 0;
        let touchStartY = 0;

        function addTouchSupport() {
            gridEl.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            gridEl.addEventListener('touchend', (e) => {
                if (gameState.isAnimating) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;

                const rect = gridEl.getBoundingClientRect();
                const touchX = touchStartX - rect.left;
                const touchY = touchStartY - rect.top;
                const cellSize = rect.width / gameState.size;
                const row = Math.floor(touchY / cellSize);
                const col = Math.floor(touchX / cellSize);

                // 判断是水平还是垂直滑动
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    // 水平滑动 - 行
                    if (Math.abs(deltaX) > 30) {
                        const direction = deltaX > 0 ? 1 : -1;
                        if (slideRow(gameState.grid, row, direction)) {
                            renderGrid();
                            checkAndFinish();
                        }
                    }
                } else {
                    // 垂直滑动 - 列
                    if (Math.abs(deltaY) > 30) {
                        const direction = deltaY > 0 ? 1 : -1;
                        if (slideCol(gameState.grid, col, direction)) {
                            renderGrid();
                            checkAndFinish();
                        }
                    }
                }
            }, { passive: true });
        }

        // 检查完成并显示成功
        function checkAndFinish() {
            if (checkComplete() && !gameState.completed) {
                gameState.completed = true;
                stopTimer();
                showSuccess();
                saveBestScore();
            }
        }

        // 显示成功弹窗
        function showSuccess() {
            document.getElementById('final-moves').textContent = gameState.moves;
            document.getElementById('final-time').textContent = gameState.elapsedTime;
            successOverlay.classList.add('show');
        }

        // 开始计时器
        function startTimer() {
            gameState.startTime = Date.now();
            gameState.elapsedTime = 0;
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
            gameState.timerInterval = setInterval(() => {
                gameState.elapsedTime = Math.floor((Date.now() - gameState.startTime) / 1000);
                timeEl.textContent = gameState.elapsedTime;
            }, 1000);
        }

        function stopTimer() {
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
        }

        // 更新统计显示
        function updateStats() {
            movesEl.textContent = gameState.moves;
        }

        // 更新最佳分数显示
        function updateBestScore() {
            const best = bestScores[gameState.size];
            if (best) {
                bestScoreEl.style.display = 'block';
                bestTimeEl.textContent = `${best}s`;
            } else {
                bestScoreEl.style.display = 'none';
            }
        }

        // 保存最佳分数
        function saveBestScore() {
            const currentBest = bestScores[gameState.size];
            if (!currentBest || gameState.elapsedTime < currentBest) {
                bestScores[gameState.size] = gameState.elapsedTime;
                localStorage.setItem('colorSortBestScores', JSON.stringify(bestScores));
                updateBestScore();
            }
        }

        // 事件绑定
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.diff-btn.active').classList.remove('active');
                btn.classList.add('active');
                const size = parseInt(btn.dataset.size);
                initGame(size);
            });
        });

        document.getElementById('new-game-btn').addEventListener('click', () => {
            const size = parseInt(document.querySelector('.diff-btn.active').dataset.size);
            initGame(size);
        });

        document.getElementById('undo-btn').addEventListener('click', undo);

        document.getElementById('play-again-btn').addEventListener('click', () => {
            const size = gameState.size;
            initGame(size);
        });

        // 防止页面滚动在触摸滑动时
        gridEl.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // 初始化开始
        initGame(3);
    </script>
</body>
</html>
