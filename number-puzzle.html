<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字华容道</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  text-align: center;
}
h1 { color: #333; margin-bottom: 20px; font-size: 2em; }
.info {
  display: flex;
  justify-content: space-around;
  margin-bottom: 20px;
  font-size: 1.1em;
  font-weight: bold;
  color: #555;
}
.controls { margin-bottom: 20px; }
button, select {
  padding: 10px 20px;
  margin: 0 5px;
  font-size: 1em;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #667eea;
  color: white;
  transition: background 0.3s;
}
button:hover, select:hover { background: #5568d3; }
#puzzle {
  display: grid;
  gap: 5px;
  background: #333;
  padding: 5px;
  border-radius: 10px;
  margin: 0 auto;
}
.tile {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8em;
  font-weight: bold;
  color: white;
  cursor: pointer;
  transition: transform 0.15s ease-in-out;
  user-select: none;
}
.tile:hover { transform: scale(1.05); }
.tile.empty {
  background: #ddd;
  cursor: default;
}
.tile.correct {
  background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}
@media (max-width: 500px) {
  .container { padding: 20px; }
  h1 { font-size: 1.5em; }
  .tile { font-size: 1.4em; }
}
</style>
</head>
<body>
<div class="container">
  <h1>数字华容道</h1>
  <div class="info">
    <div>步数: <span id="moves">0</span></div>
    <div>时间: <span id="time">0</span>s</div>
  </div>
  <div class="controls">
    <select id="sizeSelect">
      <option value="3">3×3</option>
      <option value="4" selected>4×4</option>
      <option value="5">5×5</option>
    </select>
    <button id="shuffleBtn">打乱重排</button>
  </div>
  <div id="puzzle"></div>
</div>

<script>
let size = 4;
let board = [];
let moves = 0;
let startTime = null;
let timerInterval = null;
let isPlaying = false;

const puzzleEl = document.getElementById('puzzle');
const movesEl = document.getElementById('moves');
const timeEl = document.getElementById('time');
const sizeSelect = document.getElementById('sizeSelect');
const shuffleBtn = document.getElementById('shuffleBtn');

sizeSelect.addEventListener('change', () => {
  size = parseInt(sizeSelect.value);
  initGame();
});

shuffleBtn.addEventListener('click', () => {
  initGame();
});

puzzleEl.addEventListener('click', (e) => {
  if (!isPlaying || !e.target.classList.contains('tile') || e.target.classList.contains('empty')) return;
  const index = parseInt(e.target.dataset.index);
  const row = Math.floor(index / size);
  const col = index % size;
  moveTile(row, col);
});

function initGame() {
  clearInterval(timerInterval);
  moves = 0;
  movesEl.textContent = moves;
  timeEl.textContent = '0';
  board = createSolvedBoard();
  shuffleBoard();
  render();
  startTime = Date.now();
  isPlaying = true;
  timerInterval = setInterval(updateTime, 1000);
}

function createSolvedBoard() {
  const arr = [];
  for (let i = 1; i < size * size; i++) {
    arr.push(i);
  }
  arr.push(0); // 0 represents empty
  return arr;
}

function shuffleBoard() {
  // Fisher-Yates shuffle, ensure solvability
  for (let i = board.length - 2; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [board[i], board[j]] = [board[j], board[i]];
  }
  // If puzzle is not solvable, swap two non-empty tiles to make it solvable
  if (!isSolvable()) {
    for (let i = 0; i < board.length - 2; i++) {
      if (board[i] !== 0 && board[i+1] !== 0) {
        [board[i], board[i+1]] = [board[i+1], board[i]];
        break;
      }
    }
  }
}

function isSolvable() {
  let inversions = 0;
  const emptyRowFromBottom = size - Math.floor(board.indexOf(0) / size);
  for (let i = 0; i < board.length; i++) {
    if (board[i] === 0) continue;
    for (let j = i + 1; j < board.length; j++) {
      if (board[j] === 0) continue;
      if (board[i] > board[j]) inversions++;
    }
  }
  if (size % 2 === 1) {
    return inversions % 2 === 0;
  } else {
    return (emptyRowFromBottom % 2 === 0) !== (inversions % 2 === 0);
  }
}

function render() {
  puzzleEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  puzzleEl.style.gridTemplateRows = `repeat(${size}, 1fr)`;
  const tileSize = Math.min(window.innerWidth - 60, 400) / size;
  puzzleEl.style.width = puzzleEl.style.height = `${tileSize * size + 5 * (size + 1)}px`;
  puzzleEl.innerHTML = '';
  board.forEach((val, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (val === 0 ? ' empty' : val === idx + 1 ? ' correct' : '');
    tile.dataset.index = idx;
    tile.textContent = val || '';
    if (val !== 0) {
      tile.style.width = `${tileSize}px`;
      tile.style.height = `${tileSize}px`;
    }
    puzzleEl.appendChild(tile);
  });
}

function moveTile(row, col) {
  const emptyIdx = board.indexOf(0);
  const emptyRow = Math.floor(emptyIdx / size);
  const emptyCol = emptyIdx % size;

  if ((Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
      (Math.abs(col - emptyCol) === 1 && row === emptyRow)) {
    // Swap
    const currentIdx = row * size + col;
    [board[currentIdx], board[emptyIdx]] = [board[emptyIdx], board[currentIdx]];
    moves++;
    movesEl.textContent = moves;
    render();
    if (checkWin()) {
      clearInterval(timerInterval);
      isPlaying = false;
      setTimeout(() => {
        alert(`恭喜完成！\n步数: ${moves}\n时间: ${timeEl.textContent}s`);
      }, 300);
    }
  }
}

function checkWin() {
  for (let i = 0; i < board.length - 1; i++) {
    if (board[i] !== i + 1) return false;
  }
  return true;
}

function updateTime() {
  if (!isPlaying) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  timeEl.textContent = elapsed;
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (!isPlaying) return;
  const emptyIdx = board.indexOf(0);
  const row = Math.floor(emptyIdx / size);
  const col = emptyIdx % size;
  let targetRow = row, targetCol = col;
  switch(e.key) {
    case 'ArrowUp': targetRow = row - 1; break;
    case 'ArrowDown': targetRow = row + 1; break;
    case 'ArrowLeft': targetCol = col - 1; break;
    case 'ArrowRight': targetCol = col + 1; break;
    default: return;
  }
  if (targetRow >= 0 && targetRow < size && targetCol >= 0 && targetCol < size) {
    moveTile(targetRow, targetCol);
  }
});

// Start game
initGame();
</script>
</body>
</html>
