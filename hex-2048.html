<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>六边形 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
.container{max-width:600px;margin:0 auto;padding:20px;text-align:center}
header{margin-bottom:20px}
h1{color:#eee;font-size:32px;margin:10px 0}
.scores{display:flex;justify-content:center;gap:15px;margin:15px 0}
.score-box{background:#16213e;padding:10px 20px;border-radius:8px;min-width:80px}
.score-label{color:#888;font-size:12px}
.score-value{color:#eee;font-size:24px;font-weight:bold}
canvas{display:block;margin:0 auto;touch-action:none}
.game-over{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:30px;border-radius:15px;display:none;z-index:100;color:white}
.game-over h2{margin-bottom:20px;font-size:32px}
.game-over button{background:#e94560;color:white;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin:10px}
.game-over button:hover{background:#d63557}
#newGameBtn{background:#0f3460;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}
#newGameBtn:hover{background:#1a1a2e}
.hints{color:#666;font-size:14px;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<header>
<h1>六边形 2048</h1>
<div class="scores">
<div class="score-box">
<div class="score-label">分数</div>
<div class="score-value" id="score">0</div>
</div>
<div class="score-box">
<div class="score-label">最高分</div>
<div class="score-value" id="highScore">0</div>
</div>
</div>
<button id="newGameBtn">新游戏</button>
</header>
<canvas id="gameCanvas"></canvas>
<div class="hints">WASD 或 方向键移动 | 触摸滑动</div>
</div>
<div class="game-over" id="gameOver">
<h2>游戏结束！</h2>
<button onclick="restartGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const H=4,SIZE=50;
let grid,score,highScore=localStorage.getItem('hex2048_highScore')||0;
const colors={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
const dirs=[[0,-1],[1,-1],[1,0],[0,1],[-1,1],[-1,0]];
// 映射方向索引
const keyDirs={'ArrowUp':0,'w':0,'W':0,'ArrowRight':1,'d':1,'D':1,'ArrowDown':3,'s':3,'S':3,'ArrowLeft':5,'a':5,'A':5,'e':2,'E':2,'q':4,'Q':4};

function init(){const s=Math.min(window.innerWidth-40,window.innerHeight-200);
canvas.width=s;canvas.height=s*0.9;
grid=Array(H).fill().map(()=>Array(H*2-1).fill(0));
for(let r=H-2;r<H;r++)for(let c=0;c<H*2-1;c++)
if(Math.abs(c-r)<H)grid[r][c]=0;else grid[r][c]=-1;
score=0;addTile();addTile();updateDisplay();}
function getHexPos(r,c){const cx=canvas.width/2,cy=canvas.height/2;
const x=cx+SIZE*(c-H+1)*Math.cos(Math.PI/6),y=cy+SIZE*(r-H/2)*1.5;
return{x,y};}
function drawHex(x,y,val){const r=SIZE-4;ctx.beginPath();
for(let i=0;i<6;i++){const angle=(i-2)*Math.PI/6;
ctx.lineTo(x+r*Math.cos(angle),y+r*Math.sin(angle));}ctx.closePath();
ctx.fillStyle=colors[val]||'#3c3a32';ctx.fill();
ctx.strokeStyle=val>0?'#8f7a66':'#ccc';ctx.lineWidth=2;ctx.stroke();
if(val){ctx.fillStyle=val<=2?'#776e65':'#f9f6f2';ctx.font=`bold ${r*0.5}px Arial`;
ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val,x,y);}}
function render(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
for(let r=0;r<H;r++)for(let c=0;c<H*2-1;c++)if(grid[r][c]!==-1){
const p=getHexPos(r,c);drawHex(p.x,p.y,grid[r][c]);}}
function addTile(){const valid=[];
for(let r=0;r<H;r++)for(let c=0;c<H*2-1;c++)if(grid[r][c]===0)valid.push([r,c]);
if(valid.length){const [r,c]=valid[Math.floor(Math.random()*valid.length)];
grid[r][c]=Math.random()<0.9?2:4;}}
function move(d){let moved=false;
const [dx, dy] = dirs[d];
// 处理不同方向的遍历顺序
const sorted = [];
for (let r = 0; r < H; r++) {
  for (let c = r; c < H*2-1 - r; c++) {
    if (grid[r][c] !== -1) sorted.push([r, c]);
  }
}
// 根据方向调整遍历顺序
if (d === 0 || d === 1) {
  // 向上/右上，从上到下不需要处理
} else if (d === 3 || d === 4) {
  // 向下/左下，反向遍历
  sorted.reverse();
}

for (const [r, c] of sorted) {
  if (grid[r][c] === 0) continue;
  let nr = r, nc = c;
  // 持续移动直到不能移动
  while (true) {
    const nextR = nr + dx;
    const nextC = nc + dy;
    if (nextR < 0 || nextR >= H || nextC < 0 || nextC >= H*2-1 || grid[nextR][nextC] === -1) break;
    
    if (grid[nextR][nextC] === 0) {
      // 空格，移动过去
      grid[nextR][nextC] = grid[nr][nc];
      grid[nr][nc] = 0;
      nr = nextR;
      nc = nextC;
      moved = true;
    } else if (grid[nextR][nextC] === grid[nr][nc]) {
      // 相同数字，合并
      grid[nextR][nextC] *= 2;
      score += grid[nextR][nextC];
      grid[nr][nc] = 0;
      if (grid[nextR][nextC] === 2048) win();
      moved = true;
      break;
    } else {
      break;
    }
  }
}

if (moved) {
  addTile();
  updateDisplay();
  checkGameOver();
}}
function updateDisplay(){render();
document.getElementById('score').textContent=score;
document.getElementById('highScore').textContent=Math.max(score,highScore);
localStorage.setItem('hex2048_highScore',Math.max(score,highScore));}
function checkGameOver(){for(let r=0;r<H;r++)for(let c=0;c<H*2-1;c++){if(grid[r][c]===0||grid[r][c]===-1)continue;
for(let [dr,dc]of dirs){const nr=r+dr,nc=c+dc;
if(nr>=0&&nr<H&&nc>=0&&nc<H*2-1&&grid[nr][nc]!==-1&&grid[nr][nc]===grid[r][c])return;}}
document.getElementById('gameOver').style.display='block';}
function win(){if(score>highScore)highScore=score;}
function restartGame(){document.getElementById('gameOver').style.display='none';init();}
document.addEventListener('keydown',e=>{const kd=keyDirs[e.key];
if(kd){e.preventDefault();move(kd);}});
let touchStartX,touchStartY;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();
const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;
if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
const angle=Math.atan2(dy,dx)*180/Math.PI;
if(angle>-30&&angle<30)move(2); // right
else if(angle>=30&&angle<90)move(0); // up-right
else if(angle>=90&&angle<150)move(3); // down
else if(angle>=150||angle<=-150)move(4); // down-left
else if(angle>-150&&angle<=-90)move(5); // left
else if(angle>-90&&angle<=-30)move(1); // up-left
},{passive:false});
document.getElementById('newGameBtn').addEventListener('click',restartGame);
window.addEventListener('resize',()=>{init();});
init();
</script>
</body>
</html>
