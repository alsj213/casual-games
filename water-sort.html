<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水排序拼图</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
h1 {
  color: white;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
#gameContainer {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  max-width: 600px;
  width: 100%;
}
#levelInfo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  font-size: 18px;
  font-weight: bold;
  color: #333;
}
button {
  background: #667eea;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.3s;
}
button:hover {
  background: #5568d3;
}
#tubes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
  gap: 20px;
  margin-bottom: 25px;
  justify-items: center;
}
.tube {
  width: 60px;
  height: 200px;
  border: 3px solid #333;
  border-top: none;
  border-radius: 0 0 30px 30px;
  display: flex;
  flex-direction: column-reverse;
  overflow: hidden;
  cursor: pointer;
  background: white;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.tube.selected {
  transform: translateY(-10px);
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
}
.layer {
  width: 100%;
  transition: height 0.3s;
}
#controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
#winMessage {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.4);
  text-align: center;
  z-index: 100;
}
#winMessage h2 {
  color: #667eea;
  margin-bottom: 20px;
  font-size: 28px;
}
</style>
</head>
<body>
<h1>水排序拼图</h1>
<div id="gameContainer">
  <div id="levelInfo">
    <span>关卡: <span id="currentLevel">1</span></span>
    <button id="undoBtn">撤销</button>
  </div>
  <div id="tubes"></div>
  <div id="controls">
    <button id="prevLevel">上一关</button>
    <button id="nextLevel">下一关</button>
    <button id="restart">重新开始</button>
  </div>
</div>
<div id="winMessage">
  <h2>恭喜过关！🎉</h2>
  <button id="nextLevelBtn">下一关</button>
</div>

<script>
const levels = [
  // Level 1
  [
    ['red', 'blue', 'red', 'blue'],
    ['blue', 'red', 'blue', 'red'],
    [],
    []
  ],
  // Level 2
  [
    ['green', 'blue', 'yellow'],
    ['blue', 'yellow', 'green'],
    ['yellow', 'green', 'blue'],
    [],
    []
  ],
  // Level 3
  [
    ['red', 'blue', 'green', 'yellow'],
    ['yellow', 'green', 'blue', 'red'],
    ['blue', 'red', 'yellow', 'green'],
    ['green', 'yellow', 'red', 'blue'],
    [],
    []
  ],
  // Level 4
  [
    ['purple', 'orange', 'orange', 'purple'],
    ['blue', 'blue', 'purple', 'orange'],
    ['orange', 'purple', 'blue', 'blue'],
    ['green', 'yellow', 'yellow', 'green'],
    ['yellow', 'green', 'purple', 'orange'],
    [],
    []
  ],
  // Level 5
  [
    ['red', 'blue', 'green', 'yellow'],
    ['blue', 'yellow', 'red', 'green'],
    ['green', 'red', 'yellow', 'blue'],
    ['purple', 'purple', 'orange', 'orange'],
    ['orange', 'orange', 'purple', 'purple'],
    [],
    []
  ]
];

const colors = {
  red: '#ff4444',
  blue: '#33b5e5',
  green: '#00C851',
  yellow: '#ffbb33',
  purple: '#aa66cc',
  orange: '#ff8800'
};

let currentLevelIndex = 0;
let gameState = [];
let selectedTube = null;
let history = [];

const tubesEl = document.getElementById('tubes');
const currentLevelEl = document.getElementById('currentLevel');
const winMessage = document.getElementById('winMessage');

function initGame() {
  gameState = JSON.parse(JSON.stringify(levels[currentLevelIndex]));
  history = [];
  selectedTube = null;
  render();
  winMessage.style.display = 'none';
}

function saveState() {
  history.push(JSON.parse(JSON.stringify(gameState)));
  if (history.length > 20) history.shift();
}

function undo() {
  if (history.length === 0) return;
  gameState = history.pop();
  selectedTube = null;
  render();
}

function render() {
  tubesEl.innerHTML = '';
  gameState.forEach((tube, index) => {
    const tubeEl = document.createElement('div');
    tubeEl.className = 'tube' + (selectedTube === index ? ' selected' : '');
    tubeEl.addEventListener('click', () => handleTubeClick(index));
    
    const maxHeight = 200;
    const layerHeight = maxHeight / 4;
    
    tube.forEach(layerColor => {
      const layerEl = document.createElement('div');
      layerEl.className = 'layer';
      layerEl.style.backgroundColor = colors[layerColor];
      layerEl.style.height = layerHeight + 'px';
      tubeEl.appendChild(layerEl);
    });
    
    tubesEl.appendChild(tubeEl);
  });
  currentLevelEl.textContent = currentLevelIndex + 1;
}

function canPour(fromIndex, toIndex) {
  const from = gameState[fromIndex];
  const to = gameState[toIndex];
  
  if (from.length === 0) return false;
  if (to.length === 4) return false;
  if (to.length === 0) return true;
  
  return from[from.length - 1] === to[to.length - 1];
}

function pour(fromIndex, toIndex) {
  const from = gameState[fromIndex];
  const to = gameState[toIndex];
  
  while (from.length > 0 && to.length < 4 && (to.length === 0 || from[from.length - 1] === to[to.length - 1])) {
    to.push(from.pop());
  }
}

function checkWin() {
  return gameState.every(tube => {
    if (tube.length === 0) return true;
    if (tube.length !== 4) return false;
    return tube.every(color => color === tube[0]);
  });
}

function handleTubeClick(index) {
  if (selectedTube === null) {
    if (gameState[index].length > 0) {
      selectedTube = index;
      render();
    }
  } else if (selectedTube === index) {
    selectedTube = null;
    render();
  } else {
    if (canPour(selectedTube, index)) {
      saveState();
      pour(selectedTube, index);
      selectedTube = null;
      render();
      
      if (checkWin()) {
        setTimeout(() => {
          winMessage.style.display = 'block';
        }, 500);
      }
    } else {
      selectedTube = index;
      if (gameState[index].length === 0) {
        selectedTube = null;
      }
      render();
    }
  }
}

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('restart').addEventListener('click', () => initGame());
document.getElementById('prevLevel').addEventListener('click', () => {
  if (currentLevelIndex > 0) {
    currentLevelIndex--;
    initGame();
  }
});
document.getElementById('nextLevel').addEventListener('click', () => {
  if (currentLevelIndex < levels.length - 1) {
    currentLevelIndex++;
    initGame();
  }
});
document.getElementById('nextLevelBtn').addEventListener('click', () => {
  if (currentLevelIndex < levels.length - 1) {
    currentLevelIndex++;
    initGame();
  } else {
    winMessage.style.display = 'none';
  }
});

initGame();
</script>
</body>
</html>
