<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气球爆破</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #98D8C8);
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #333;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px white;
            pointer-events: none;
        }
        .stat {
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        #gameOver h1 {
            color: #FF6B6B;
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        #restartBtn {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        #restartBtn:hover {
            transform: scale(1.1);
            background: #45B7AA;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="ui">
            <div class="stat">分数: <span id="score">0</span></div>
            <div class="stat">生命: <span id="lives">3</span></div>
        </div>
        <div id="gameOver">
            <h1>游戏结束</h1>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let score = 0;
        let lives = 3;
        let balloons = [];
        let gameRunning = true;
        let spawnRate = 60;
        let frameCount = 0;
        let difficulty = 1;

        const balloonTypes = [
            { color: '#FF6B6B', size: 25, speed: 1.5, points: 10 },
            { color: '#4ECDC4', size: 30, speed: 1.3, points: 15 },
            { color: '#FFE66D', size: 20, speed: 1.8, points: 5 },
            { color: '#95E1D3', size: 35, speed: 1.2, points: 20 },
            { color: '#F38181', size: 40, speed: 1.0, points: 25 }
        ];

        class Balloon {
            constructor() {
                const type = balloonTypes[Math.floor(Math.random() * balloonTypes.length)];
                this.x = Math.random() * (canvas.width - type.size * 2) + type.size;
                this.y = canvas.height + type.size;
                this.radius = type.size * (0.8 + Math.random() * 0.4);
                this.color = type.color;
                this.speed = type.speed * (0.8 + Math.random() * 0.4) * difficulty;
                this.points = Math.floor(type.points * (this.radius / type.size));
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.popped = false;
                this.popParticles = [];
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, 'white');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.color);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.radius);
                ctx.lineTo(this.x, this.y + this.radius + 15);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            isClicked(mx, my) {
                const dist = Math.sqrt((mx - this.x) ** 2 + (my - this.y) ** 2);
                return dist < this.radius;
            }

            createPopParticles() {
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 * i) / 8;
                    this.popParticles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3,
                        radius: 4,
                        color: this.color,
                        life: 20
                    });
                }
            }

            updateParticles() {
                this.popParticles = this.popParticles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.radius *= 0.95;
                    p.life--;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    return p.life > 0;
                });
            }
        }

        function spawnBalloon() {
            balloons.push(new Balloon());
        }

        function update() {
            frameCount++;
            if (frameCount % Math.max(30, spawnRate) === 0) {
                spawnBalloon();
            }
            if (frameCount % 600 === 0) {
                difficulty += 0.1;
                spawnRate = Math.max(25, spawnRate - 5);
            }

            balloons.forEach(b => b.update());

            balloons = balloons.filter(b => {
                if (b.y + b.radius < 0 && !b.popped) {
                    lives--;
                    livesEl.textContent = lives;
                    if (lives <= 0) {
                        endGame();
                    }
                    return false;
                }
                return !b.popped || b.popParticles.length > 0;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            balloons.forEach(b => {
                if (!b.popped) {
                    b.draw();
                } else {
                    b.updateParticles();
                }
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleClick(e) {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            for (let i = balloons.length - 1; i >= 0; i--) {
                if (!balloons[i].popped && balloons[i].isClicked(mx, my)) {
                    balloons[i].popped = true;
                    balloons[i].createPopParticles();
                    score += balloons[i].points;
                    scoreEl.textContent = score;
                    break;
                }
            }
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            score = 0;
            lives = 3;
            balloons = [];
            gameRunning = true;
            spawnRate = 60;
            frameCount = 0;
            difficulty = 1;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            gameOverEl.style.display = 'none';
            gameLoop();
        }

        canvas.addEventListener('click', handleClick);
        restartBtn.addEventListener('click', restartGame);

        gameLoop();
    </script>
</body>
</html>
