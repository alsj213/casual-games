<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>打地鼠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .game-container { background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        h1 { color: #333; margin-bottom: 20px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 25px; padding: 15px; background: #f0f0f0; border-radius: 10px; font-size: 1.3em; }
        .info-item { display: flex; align-items: center; gap: 8px; }
        .info-item span { font-weight: bold; color: #e74c3c; }
        .info-item:nth-child(2) span { color: #27ae60; }
        .info-item:nth-child(3) span { color: #3498db; }
        .game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .hole { width: 120px; height: 120px; background: radial-gradient(circle at 50% 80%, #8B4513 0%, #654321 70%, #3d2817 100%); border-radius: 50%; position: relative; overflow: hidden; cursor: pointer; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }
        .mole { width: 80%; height: 80%; border-radius: 50%; position: absolute; bottom: -100%; left: 10%; transition: bottom 0.2s ease-out; cursor: pointer; }
        .mole.normal { background: radial-gradient(circle at 40% 40%, #d4a574 0%, #8B4513 50%, #5c3317 100%); }
        .mole.golden { background: radial-gradient(circle at 40% 40%, #ffd700 0%, #ffb347 50%, #ff8c00 100%); box-shadow: 0 0 20px rgba(255,215,0,0.6); }
        .mole.fast { background: radial-gradient(circle at 40% 40%, #ff6b6b 0%, #c0392b 50%, #7b241c 100%); animation: shake 0.1s infinite; }
        .mole.active { bottom: 10%; }
        .mole.golden.active { animation: glow 0.5s infinite alternate; }
        @keyframes shake { 0%, 100% { transform: translateX(-2px); } 50% { transform: translateX(2px); } }
        @keyframes glow { from { box-shadow: 0 0 10px rgba(255,215,0,0.4); } to { box-shadow: 0 0 30px rgba(255,215,0,0.9); } }
        .mole::before, .mole::after { content: ''; position: absolute; width: 8px; height: 8px; background: #333; border-radius: 50%; top: 35%; }
        .mole::before { left: 30%; } .mole::after { right: 30%; }
        .mole::after { content: ''; position: absolute; width: 20px; height: 10px; background: #333; border-radius: 50%; top: 55%; left: 50%; transform: translateX(-50%); }
        .btn { padding: 15px 40px; font-size: 1.3em; cursor: pointer; border: none; border-radius: 10px; margin: 10px; transition: all 0.3s; }
        .btn-start { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .score-popup { position: fixed; pointer-events: none; font-size: 2em; font-weight: bold; animation: popup 0.5s ease-out forwards; }
        @keyframes popup { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; } }
        .game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
        .game-over-content { background: white; padding: 40px; border-radius: 20px; text-align: center; }
        .legend { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; font-size: 0.9em; }
        .legend-item { display: inline-block; margin: 0 10px; } .legend-normal { color: #8B4513; } .legend-golden { color: #ffd700; } .legend-fast { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔨 打地鼠</h1>
        <div class="info-bar">
            <div class="info-item">⏱️ <span id="timer">60</span></div>
            <div class="info-item">🎯 得分: <span id="score">0</span></div>
            <div class="info-item">🏆 最高分: <span id="highscore">0</span></div>
        </div>
        <div class="game-board" id="board"></div>
        <button class="btn btn-start" id="startBtn">开始游戏</button>
        <div class="legend">
            <span class="legend-item"><span class="legend-normal">●</span> 普通: 10分</span>
            <span class="legend-item"><span class="legend-golden">●</span> 金色: 30分</span>
            <span class="legend-item"><span class="legend-fast">●</span> 快速: 50分</span>
        </div>
    </div>
    <div class="game-over" id="gameOver" style="display: none;">
        <div class="game-over-content">
            <h2>游戏结束！🎉</h2>
            <p id="finalScore">得分: 0</p>
            <button class="btn btn-start" onclick="location.reload()">再玩一次</button>
        </div>
    </div>
    <script>
        const board = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const highscoreEl = document.getElementById('highscore');
        const startBtn = document.getElementById('startBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        
        let score = 0;
        let timeLeft = 60;
        let gameInterval, moleInterval;
        let isPlaying = false;
        const holes = [];
        const highscore = localStorage.getItem('highscore') || 0;
        highscoreEl.textContent = highscore;
        
        function createBoard() {
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                const mole = document.createElement('div');
                mole.className = 'mole normal';
                mole.dataset.index = i;
                mole.addEventListener('click', whack);
                hole.appendChild(mole);
                board.appendChild(hole);
                holes.push({ element: hole, mole: mole, active: false });
            }
        }
        
        function whack(e) {
            if (!isPlaying || !e.target.classList.contains('mole')) return;
            const index = e.target.dataset.index;
            if (!holes[index].active) return;
            
            let points = 10;
            if (e.target.classList.contains('golden')) points = 30;
            if (e.target.classList.contains('fast')) points = 50;
            
            score += points;
            scoreEl.textContent = score;
            showScorePopup(e, points);
            hideMole(index);
        }
        
        function showScorePopup(e, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = `${e.clientX}px`;
            popup.style.top = `${e.clientY}px`;
            popup.style.color = points >= 30 ? (points === 50 ? '#ff6b6b' : '#ffd700') : '#e74c3c';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 500);
        }
        
        function showRandomMole() {
            const activeHoles = holes.filter(h => h.active);
            if (activeHoles.length >= 3) return;
            
            const inactiveHoles = holes.filter(h => !h.active);
            if (inactiveHoles.length === 0) return;
            
            const randomHole = inactiveHoles[Math.floor(Math.random() * inactiveHoles.length)];
            const rand = Math.random();
            
            randomHole.mole.className = 'mole';
            if (rand < 0.15) randomHole.mole.classList.add('golden');
            else if (rand < 0.4) randomHole.mole.classList.add('fast');
            else randomHole.mole.classList.add('normal');
            
            randomHole.mole.classList.add('active');
            randomHole.active = true;
            
            let duration = 1500;
            if (randomHole.mole.classList.contains('golden')) duration = 1000;
            if (randomHole.mole.classList.contains('fast')) duration = 600;
            
            setTimeout(() => hideMole(holes.indexOf(randomHole)), duration);
        }
        
        function hideMole(index) {
            if (holes[index] && holes[index].active) {
                holes[index].mole.classList.remove('active');
                holes[index].active = false;
            }
        }
        
        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            startBtn.disabled = true;
            
            moleInterval = setInterval(showRandomMole, 800);
            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 10) timerEl.style.color = '#e74c3c';
                else timerEl.style.color = '#e74c3c';
                
                if (timeLeft <= 0) endGame();
            }, 1000);
        }
        
        function endGame() {
            isPlaying = false;
            clearInterval(moleInterval);
            clearInterval(gameInterval);
            holes.forEach(h => { h.mole.classList.remove('active'); h.active = false; });
            
            if (score > highscore) {
                localStorage.setItem('highscore', score);
                highscoreEl.textContent = score;
            }
            
            finalScoreEl.textContent = `得分: ${score}`;
            gameOverEl.style.display = 'flex';
        }
        
        createBoard();
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
