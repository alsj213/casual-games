<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emoji猜成语 - Casual Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .emoji-box {
            transition: all 0.3s ease;
            animation: bounceIn 0.5s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .level-item {
            transition: all 0.2s ease;
        }
        
        .level-item.completed {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgb(34, 197, 94);
        }
        
        .level-item.current {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgb(59, 130, 246);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        
        .keyboard-key {
            transition: all 0.1s ease;
        }
        
        .keyboard-key:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }
        
        .answer-char {
            animation: slideDown 0.2s ease-out;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .player-item.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgb(59, 130, 246);
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .difficulty-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>

                </div>
                <button id="start-game" class="w-full mt-4 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-lg font-bold text-gray-900 hover:opacity-90 transition-opacity">

        <!-- Main Game Area -->

            <div id="emoji-container" class="flex flex-wrap justify-center gap-3 mb-6">

            <div id="answer-container" class="flex justify-center gap-2 mb-6 flex-wrap">

            <div id="hint-area" class="mb-4 p-3 bg-white/10 rounded-lg hidden">

    </div>

            { emojis: ['🌸', '🌎', '🌍', '🌏'], answer: '春暖花开', difficulty: 'hard' },
            { emojis: ['🐟', '🐟', '💧', '🌊'], answer: '浑水摸鱼', difficulty: 'hard' },
            { emojis: ['👴', '👴', '👶', '👶'], answer: '老老少少', difficulty: 'hard' },
            { emojis: ['🔔', '🔔', '🍚', '🍚'], answer: '一石二鸟', difficulty: 'hard' },
            { emojis: ['🌊', '🌊', '🏔️', '🏔️'], answer: '万水千山', difficulty: 'hard' },
            { emojis: ['🐦', '🐦', '🦅', '🦅'], answer: '鸦雀无声', difficulty: 'hard' },
            { emojis: ['🌳', '🕳️', '🐍', '🐍'], answer: '打草惊蛇', difficulty: 'hard' },
            { emojis: ['🔴', '🔴', '💚', '💚'], answer: '红男绿女', difficulty: 'hard' },
            { emojis: ['🐉', '☁️', '🐯', '🌬️'], answer: '龙腾虎跃', difficulty: 'hard' },
            { emojis: ['👋', '👋', '🐔', '🐔'], answer: '三三两两', difficulty: 'hard' },
            { emojis: ['🧵', '☁️', '🌧️', '💧'], answer: '行云流水', difficulty: 'hard' },
            { emojis: ['🏔️', '🐔', '🌾', '🟢'], answer: '高山流水', difficulty: 'hard' }
        ];
        let gameState = {
            mode: 'single', // single or pk
            playerCount: 2,
            difficulty: 'easy',
            currentLevel: 0,
            currentPlayer: 0,
            completed: [],
            players: [],
            currentPuzzle: null,
            currentAnswer: [],
            shuffledChars: [],
            hintsUsed: 0
        };

        const elements = {
            modeSelection: document.getElementById('mode-selection'),
            playerCountContainer: document.getElementById('player-count-container'),
            pkScoreboard: document.getElementById('pk-scoreboard'),
            playersContainer: document.getElementById('players-container'),
            gameArea: document.getElementById('game-area'),
            gameControls: document.getElementById('game-controls'),
            levelInfo: document.getElementById('level-info'),
            progressBar: document.getElementById('progress-bar'),
            hintCount: document.getElementById('hint-count'),
            emojiContainer: document.getElementById('emoji-container'),
            answerContainer: document.getElementById('answer-container'),
            hintArea: document.getElementById('hint-area'),
            hintText: document.getElementById('hint-text'),
            keyboardContainer: document.getElementById('keyboard-container'),
            levelModal: document.getElementById('level-modal'),
            levelGrid: document.getElementById('level-grid'),
            closeModal: document.getElementById('close-modal'),
            correctModal: document.getElementById('correct-modal'),
            correctTitle: document.getElementById('correct-title'),
            correctMessage: document.getElementById('correct-message'),
            nextQuestion: document.getElementById('next-question'),
            hintBtn: document.getElementById('hint-btn'),
            skipBtn: document.getElementById('skip-btn'),
            levelSelectBtn: document.getElementById('level-select-btn'),
            restartBtn: document.getElementById('restart-btn'),
            startGameBtn: document.getElementById('start-game'),
            modeSingle: document.getElementById('mode-single'),
            modePk: document.getElementById('mode-pk')
        };

        // Load completed levels from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('emojiIdiomCompleted_' + gameState.difficulty);
            if (saved) {
                gameState.completed = JSON.parse(saved);
            }
        }

        function saveProgress() {
            localStorage.setItem('emojiIdiomCompleted_' + gameState.difficulty, JSON.stringify(gameState.completed));
        }

        function filterPuzzlesByDifficulty() {
            return puzzles.filter(p => p.difficulty === gameState.difficulty);
        }

        function startGame() {
            const filtered = filterPuzzlesByDifficulty();
            gameState.currentLevel = 0;
            gameState.hintsUsed = 0;
            loadProgress();
            
            if (gameState.mode === 'pk') {
                initPK();
            }
            
            elements.modeSelection.style.display = 'none';
            elements.gameArea.style.display = 'block';
            elements.gameControls.style.display = 'flex';
            if (gameState.mode === 'pk') {
                elements.pkScoreboard.style.display = 'block';
            }
            
            nextQuestion();
        }

        function initPK() {
            gameState.players = [];
            for (let i = 0; i < gameState.playerCount; i++) {
                gameState.players.push({ score: 0 });
            }
            gameState.currentPlayer = 0;
            renderPKScoreboard();
        }

        function renderPKScoreboard() {
            elements.playersContainer.innerHTML = '';
            gameState.players.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `player-item px-4 py-2 rounded-lg border-2 ${i === gameState.currentPlayer ? 'active' : 'bg-white/10 border-white/30'}`;
                div.innerHTML = `<div class="flex items-center justify-between">
                    <span class="text-white font-semibold">玩家 ${i + 1}</span>
                    <span class="text-yellow-300 font-bold">${p.score} 分</span>
                </div>`;
                elements.playersContainer.appendChild(div);
            });
        }

        function nextQuestion() {
            const filtered = filterPuzzlesByDifficulty();
            if (gameState.currentLevel >= filtered.length) {
                gameState.currentLevel = 0;
            }
            gameState.currentPuzzle = filtered[gameState.currentLevel];
            gameState.currentAnswer = [];
            gameState.shuffledChars = shuffleChars(gameState.currentPuzzle.answer);
            gameState.hintsUsed = 0;
            elements.hintArea.classList.add('hidden');
            updateHintCount();
            render();
        }

        function updateHintCount() {
            if (gameState.hintsUsed > 0) {
                elements.hintCount.style.display = 'block';
                elements.hintCount.textContent = `已使用 ${gameState.hintsUsed}/3 次提示`;
            } else {
                elements.hintCount.style.display = 'none';
            }
        }

        function shuffleChars(answer) {
            const chars = answer.split('');
            for (let i = chars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }
            return chars;
        }

        function render() {
            const filtered = filterPuzzlesByDifficulty();
            // Update level info
            elements.levelInfo.textContent = `${gameState.currentLevel + 1} / ${filtered.length}`;
            const progress = (gameState.completed.length / filtered.length) * 100;
            elements.progressBar.style.width = progress + '%';

            // Render emojis
            elements.emojiContainer.innerHTML = '';
            gameState.currentPuzzle.emojis.forEach(emoji => {
                const box = document.createElement('div');
                box.className = 'emoji-box w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center text-4xl border border-white/30';
                box.textContent = emoji;
                elements.emojiContainer.appendChild(box);
            });

            // Render answer slots
            elements.answerContainer.innerHTML = '';
            for (let i = 0; i < gameState.currentPuzzle.answer.length; i++) {
                const slot = document.createElement('div');
                slot.className = `w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center border-2 ${gameState.currentAnswer[i] ? 'border-yellow-300 bg-white/30' : 'border-white/30'}`;
                if (gameState.currentAnswer[i]) {
                    slot.textContent = gameState.currentAnswer[i];
                    slot.className += ' text-2xl font-bold text-white answer-char';
                }
                slot.dataset.index = i;
                if (gameState.currentAnswer[i]) {
                    slot.addEventListener('click', () => removeChar(i));
                }
                elements.answerContainer.appendChild(slot);
            }

            // Render keyboard
            renderKeyboard();
        }

        function renderKeyboard() {
            elements.keyboardContainer.innerHTML = '';
            // Split into rows of up to 6 characters
            const rows = [];
            for (let i = 0; i < gameState.shuffledChars.length; i += 6) {
                rows.push(gameState.shuffledChars.slice(i, i + 6));
            }
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-2 justify-center';
                row.forEach(char => {
                    const button = document.createElement('button');
                    button.className = 'keyboard-key w-14 h-14 bg-white/20 rounded-lg text-xl font-semibold text-white border border-white/30 hover:bg-white/30 transition-colors';
                    button.textContent = char;
                    button.addEventListener('click', () => addChar(char));
                    rowDiv.appendChild(button);
                });
                elements.keyboardContainer.appendChild(rowDiv);
            });
        }

        function addChar(char) {
            const emptyIndex = gameState.currentAnswer.findIndex(c => !c);
            if (emptyIndex !== -1) {
                gameState.currentAnswer[emptyIndex] = char;
                // Remove from shuffled chars
                const shuffledIndex = gameState.shuffledChars.indexOf(char);
                if (shuffledIndex !== -1) {
                    gameState.shuffledChars.splice(shuffledIndex, 1);
                }
                render();
                checkAnswer();
            }
        }

        function removeChar(index) {
            const char = gameState.currentAnswer[index];
            if (char) {
                gameState.currentAnswer[index] = null;
                gameState.shuffledChars.push(char);
                gameState.shuffledChars = shuffleChars(gameState.shuffledChars.filter(c => c));
                render();
            }
        }

        function checkAnswer() {
            if (gameState.currentAnswer.every(c => c)) {
                const userAnswer = gameState.currentAnswer.join('');
                if (userAnswer === gameState.currentPuzzle.answer) {
                    // Correct!
                    if (!gameState.completed.includes(gameState.currentLevel)) {
                        gameState.completed.push(gameState.currentLevel);
                        saveProgress();
                    }
                    if (gameState.mode === 'pk') {
                        // Points based on hints used: 3 - hintsUsed + 1
                        const points = 4 - gameState.hintsUsed;
                        gameState.players[gameState.currentPlayer].score += points;
                        gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.playerCount;
                        renderPKScoreboard();
                    }
                    showCorrectModal();
                }
            }
        }

        function showCorrectModal() {
            if (gameState.mode === 'single') {
                const filtered = filterPuzzlesByDifficulty();
                if (gameState.currentLevel === filtered.length - 1 && gameState.completed.length === filtered.length) {
                    elements.correctTitle.textContent = '🎉 恭喜通关全部关卡！';
                    elements.correctMessage.textContent = `你太厉害了！成功猜出了 ${filtered.length} 个${gameState.difficulty === 'easy' ? '初级' : gameState.difficulty === 'medium' ? '中级' : '高级'}题目！`;
                    elements.nextQuestion.textContent = '重新开始';
                } else {
                    elements.correctTitle.textContent = '答对了！';
                    elements.correctMessage.textContent = `正确答案是：${gameState.currentPuzzle.answer}`;
                    elements.nextQuestion.textContent = '下一题';
                }
            } else {
                elements.correctTitle.textContent = `${gameState.currentPlayer + 1}号玩家答对了！`;
                elements.correctMessage.textContent = `正确答案是：${gameState.currentPuzzle.answer}，获得 ${4 - gameState.hintsUsed} 分！`;
                elements.nextQuestion.textContent = '继续游戏';
            }
            elements.correctModal.classList.remove('hidden');
        }

        function giveHint() {
            if (gameState.hintsUsed >= 3) {
                alert('提示次数已经用完了！');
                return;
            }
            
            gameState.hintsUsed++;
            updateHintCount();
            
            // 逐步提示系统
            // 1st hint: 显示字数
            // 2nd hint: 显示第一个字
            // 3rd hint: 显示第一个和最后一个字
            elements.hintArea.classList.remove('hidden');
            
            if (gameState.hintsUsed === 1) {
                elements.hintText.textContent = `💡 提示：成语一共 ${gameState.currentPuzzle.answer.length} 个字`;
            } else if (gameState.hintsUsed === 2) {
                const firstChar = gameState.currentPuzzle.answer[0];
                elements.hintText.textContent = `💡 提示：第一个字是「${firstChar}」`;
                // Fill the first character if it's empty
                if (!gameState.currentAnswer[0]) {
                    addChar(firstChar);
                }
            } else if (gameState.hintsUsed === 3) {
                const firstChar = gameState.currentPuzzle.answer[0];
                const lastChar = gameState.currentPuzzle.answer[gameState.currentPuzzle.answer.length - 1];
                elements.hintText.textContent = `💡 提示：第一个字「${firstChar}」，最后一个字「${lastChar}」`;
                // Fill if empty
                if (!gameState.currentAnswer[0]) addChar(firstChar);
                const lastIndex = gameState.currentPuzzle.answer.length - 1;
                if (!gameState.currentAnswer[lastIndex]) addChar(lastChar);
            }
        }

        function skipQuestion() {
            if (gameState.mode === 'pk') {
                gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.playerCount;
                renderPKScoreboard();
            }
            gameState.currentLevel++;
            nextQuestion();
        }

        function showLevelSelect() {
            const filtered = filterPuzzlesByDifficulty();
            elements.levelGrid.innerHTML = '';
            filtered.forEach((_, index) => {
                const button = document.createElement('button');
                let className = 'level-item w-12 h-12 rounded-lg border-2 font-semibold ';
                if (gameState.completed.includes(index)) {
                    className += 'completed text-green-300';
                } else if (index === gameState.currentLevel) {
                    className += 'current text-blue-300';
                } else {
                    className += 'bg-white/10 border-white/30 text-white hover:bg-white/20';
                }
                button.className = className;
                button.textContent = index + 1;
                button.addEventListener('click', () => {
                    gameState.currentLevel = index;
                    gameState.hintsUsed = 0;
                    nextQuestion();
                    elements.levelModal.classList.add('hidden');
                });
                elements.levelGrid.appendChild(button);
            });
            elements.levelModal.classList.remove('hidden');
        }

        // Event bindings
        elements.modeSingle.addEventListener('click', () => {
            elements.modeSingle.classList.add('active');
            elements.modePk.classList.remove('active');
            gameState.mode = 'single';
            elements.playerCountContainer.style.display = 'none';
        });

        elements.modePk.addEventListener('click', () => {
            elements.modePk.classList.add('active');
            elements.modeSingle.classList.remove('active');
            gameState.mode = 'pk';
            elements.playerCountContainer.style.display = 'block';
        });

        document.querySelectorAll('.player-count-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.player-count-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameState.playerCount = parseInt(btn.dataset.count);
            });
        });

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => {
                    b.classList.remove('active');
                    b.classList.remove('border-green-400');
                    b.classList.remove('bg-green-500/30');
                    b.classList.remove('border-yellow-400');
                    b.classList.remove('bg-yellow-500/30');
                    b.classList.remove('border-red-400');
                    b.classList.remove('bg-red-500/30');
                });
                btn.classList.add('active');
                const diff = btn.dataset.difficulty;
                gameState.difficulty = diff;
                if (diff === 'easy') {
                    btn.classList.add('border-green-400', 'bg-green-500/30');
                } else if (diff === 'medium') {
                    btn.classList.add('border-yellow-400', 'bg-yellow-500/30');
                } else {
                    btn.classList.add('border-red-400', 'bg-red-500/30');
                }
            });
        });

        elements.startGameBtn.addEventListener('click', startGame);
        elements.hintBtn.addEventListener('click', giveHint);
        elements.skipBtn.addEventListener('click', skipQuestion);
        elements.levelSelectBtn.addEventListener('click', showLevelSelect);
        elements.closeModal.addEventListener('click', () => elements.levelModal.classList.add('hidden'));
        elements.levelModal.addEventListener('click', (e) => {
            if (e.target === elements.levelModal) {
                elements.levelModal.classList.add('hidden');
            }
        });
        elements.nextQuestion.addEventListener('click', () => {
            elements.correctModal.classList.add('hidden');
            gameState.currentLevel++;
            nextQuestion();
        });
        elements.correctModal.addEventListener('click', (e) => {
            if (e.target === elements.correctModal) {
                elements.correctModal.classList.add('hidden');
            }
        });
        elements.restartBtn.addEventListener('click', () => {
            if (confirm('确定要重新开始吗？进度会保留')) {
                gameState.currentLevel = 0;
                gameState.hintsUsed = 0;
                nextQuestion();
            }
        });
    </script>
</body>
</html>
