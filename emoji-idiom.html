<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emoji猜成语 - Casual Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .emoji-box {
            transition: all 0.3s ease;
            animation: bounceIn 0.5s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .level-item {
            transition: all 0.2s ease;
        }
        
        .level-item.completed {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgb(34, 197, 94);
        }
        
        .level-item.current {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgb(59, 130, 246);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        
        .keyboard-key {
            transition: all 0.1s ease;
        }
        
        .keyboard-key:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }
        
        .answer-char {
            animation: slideDown 0.2s ease-out;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6 max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-white mb-2">😊 Emoji猜成语</h1>
            <p class="text-purple-100 text-sm">根据表情猜成语，一共 50 关，看看你能过几关！</p>
        </div>

        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-5 shadow-xl mb-4">
            <div class="mb-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-white text-sm">关卡进度</span>
                    <span id="level-info" class="text-yellow-300 font-bold"></span>
                </div>
                <div class="w-full bg-white/20 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-yellow-300 to-pink-300 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div id="emoji-container" class="flex flex-wrap justify-center gap-3 mb-6">
                <!-- Emoji boxes will be inserted here -->
            </div>

            <div id="answer-container" class="flex justify-center gap-2 mb-6 flex-wrap">
                <!-- Answer characters will be inserted here -->
            </div>

            <div id="keyboard-container" class="space-y-2">
                <!-- Keyboard will be inserted here -->
            </div>
        </div>

        <div class="flex gap-2">
            <button id="hint-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-semibold text-gray-900 hover:opacity-90 transition-opacity">
                💡 提示
            </button>
            <button id="skip-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-gray-400 to-gray-500 rounded-xl font-semibold text-white hover:opacity-90 transition-opacity">
                ⏭️ 跳过
            </button>
        </div>

        <div class="mt-4">
            <button id="level-select-btn" class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-xl font-semibold text-white hover:bg-white/30 transition-colors">
                📋 选择关卡
            </button>
        </div>
    </div>

    <!-- Level Select Modal -->
    <div id="level-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-6 max-w-sm w-full max-h-[80vh] overflow-y-auto">
            <h3 class="text-2xl font-bold text-white mb-4 text-center">选择关卡</h3>
            <div id="level-grid" class="grid grid-cols-5 gap-2 mb-4">
                <!-- Level buttons -->
            </div>
            <button id="close-modal" class="w-full px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold text-white hover:opacity-90 transition-opacity">
                关闭
            </button>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-8 max-w-sm w-full text-center">
            <div class="text-6xl mb-4">🎉</div>
            <h2 id="win-title" class="text-2xl font-bold text-white mb-2">恭喜过关！</h2>
            <p id="win-message" class="text-gray-300 mb-6"></p>
            <div class="flex gap-2">
                <button id="next-level" class="flex-1 px-6 py-3 bg-gradient-to-r from-green-400 to-blue-500 rounded-xl font-semibold hover:opacity-90 transition-opacity">
                    下一关
                </button>
            </div>
        </div>
    </div>

    <script>
        // Emoji 猜成语题库
        const puzzles = [
            { emojis: ['🐯', '🐯', '🐺'], answer: '虎头虎脑' },
            { emojis: ['🐛', '🍃', '🐟', '🌾'], answer: '春华秋实' },
            { emojis: ['💰', '🐃', '🔑', '💣'], answer: '对牛弹琴' },
            { emojis: ['👀', '👀', '🐺', '🐑'], answer: '阳奉阴违' },
            { emojis: ['💧', '💧', '🔥', '🔥'], answer: '水深火热' },
            { emojis: ['🎹', '🐟', '🍚', '🔔'], answer: '余音绕梁' },
            { emojis: ['🌞', '☀️', '⭐', '🌙'], answer: '日新月异' },
            { emojis: ['💎', '🐶', '🔴', '❤️'], answer: '忠心耿耿' },
            { emojis: ['🧵', '☁️', '🌧️', '💧'], answer: '行云流水' },
            { emojis: ['🌳', '🌳', '🌳', '🍁'], answer: '一叶知秋' },
            { emojis: ['👦', '👩', '🐴', '👨'], answer: '青梅竹马' },
            { emojis: ['🔴', '🍎', '💚', '🍏'], answer: '红男绿女' },
            { emojis: ['🐓', '🐔', '🍑', '🍐'], answer: '说三道四' },
            { emojis: ['🌙', '🏠', '🧑‍🌾', '🥛'], answer: '闭月羞花' },
            { emojis: ['1️⃣', '🍻', '🍻', '🍻'], answer: '一石三鸟' },
            { emojis: ['💣', '✍️', '✅', '🎨'], answer: '绘声绘色' },
            { emojis: ['🌶️', '🐔', '🍼', '🍜'], answer: '鸡鸣狗盗' },
            { emojis: ['👋', '🗣️', '👋', '🐔'], answer: '三三两两' },
            { emojis: ['💡', '🏃', '🌧️', '🔥'], answer: '电光石火' },
            { emojis: ['🐸', '🐦', '🦗', '🐝'], answer: '蛙鸣蝉噪' },
            { emojis: ['👴', '👵', '👦', '👧'], answer: '老老少少' },
            { emojis: ['🐉', '🐯', '🌊', '🏔️'], answer: '龙潭虎穴' },
            { emojis: ['🎈', '🎈', '🏠', '🎈'], answer: '大同小异' },
            { emojis: ['✋', '🔴', '🔔', '🍚'], answer: '一拍即合' },
            { emojis: ['🏔️', '🏔️', '🌊', '🌊'], answer: '千山万水' },
            { emojis: ['👁️', '👁️', '🚶', '👁️'], answer: '三足鼎立' },
            { emojis: ['💎', '✂️', '🧵', '🎻'], answer: '断章取义' },
            { emojis: ['🔥', '🚗', '💰', '🌙'], answer: '风月无边' },
            { emojis: ['🦅', '🦅', '🦆', '🐓'], answer: '惺惺相惜' },
            { emojis: ['🌙', '🌙', '⛰️', '🌊'], answer: '山高水长' },
            { emojis: ['🍳', '🍴', '💀', '🔥'], answer: '生灵涂炭' },
            { emojis: ['🐑', '🐑', '➡️', '🐺'], answer: '引狼入室' },
            { emojis: ['🌸', '🌎', '🍃', '🍃'], answer: '春暖花开' },
            { emojis: ['💧', '👓', '❤️', '💔'], answer: '忠心不二' },
            { emojis: ['🎓', '👑', '🚗', '🎻'], answer: '琴棋书画' },
            { emojis: ['🌿', '🌿', '🔍', '🌿'], answer: '寻花问柳' },
            { emojis: ['👃', '👃', '🔑', '🔦'], answer: '口口声声' },
            { emojis: ['🌈', '🎿', '🏔️', '🌧️'], answer: '冰天雪地' },
            { emojis: ['💎', '🔨', '🔨', '🔩'], answer: '凿壁偷光' },
            { emojis: ['🌞', '🚢', '🌊', '📜'], answer: '一帆风顺' },
            { emojis: ['👻', '💩', '🌳', '🧣'], answer: '草木皆兵' },
            { emojis: ['🗡️', '🔪', '🪵', '🌳'], answer: '入木三分' },
            { emojis: ['👂', '🔥', '🍃', '🌙'], answer: '闻鸡起舞' },
            { emojis: ['📖', '🐟', '🍵', '🍃'], answer: '津津有味' },
            { emojis: ['🐜', '🐜', '🗣️', '⚡'], answer: '娓娓道来' },
            { emojis: ['🐎', '🌿', '👁️', '🦢'], answer: '走马观花' },
            { emojis: ['🖐️', '🎭', '❤️', '🥜'], answer: '妙手回春' },
            { emojis: ['🐟', '🐟', '🦶', '👂'], answer: '鱼目混珠' },
            { emojis: ['👈', '👉', '🍃', '🌙'], answer: '左右逢源' },
            { emojis: ['💩', '🍅', '🥚', '🚗'], answer: '亡羊补牢' }
        ];

        let gameState = {
            currentLevel: 0,
            completed: [],
            currentPuzzle: null,
            currentAnswer: [],
            shuffledChars: []
        };

        const elements = {
            levelInfo: document.getElementById('level-info'),
            progressBar: document.getElementById('progress-bar'),
            emojiContainer: document.getElementById('emoji-container'),
            answerContainer: document.getElementById('answer-container'),
            keyboardContainer: document.getElementById('keyboard-container'),
            levelSelectBtn: document.getElementById('level-select-btn'),
            levelModal: document.getElementById('level-modal'),
            levelGrid: document.getElementById('level-grid'),
            closeModal: document.getElementById('close-modal'),
            winModal: document.getElementById('win-modal'),
            winTitle: document.getElementById('win-title'),
            winMessage: document.getElementById('win-message'),
            nextLevel: document.getElementById('next-level'),
            hintBtn: document.getElementById('hint-btn'),
            skipBtn: document.getElementById('skip-btn')
        };

        // Load completed levels from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('emojiIdiomCompleted');
            if (saved) {
                gameState.completed = JSON.parse(saved);
            }
        }

        function saveProgress() {
            localStorage.setItem('emojiIdiomCompleted', JSON.stringify(gameState.completed));
        }

        function startLevel(levelIndex) {
            gameState.currentLevel = levelIndex;
            gameState.currentPuzzle = puzzles[levelIndex];
            gameState.currentAnswer = [];
            gameState.shuffledChars = shuffleChars(gameState.currentPuzzle.answer);
            render();
        }

        function shuffleChars(answer) {
            const chars = answer.split('');
            for (let i = chars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }
            return chars;
        }

        function render() {
            // Update level info
            elements.levelInfo.textContent = `${gameState.currentLevel + 1} / ${puzzles.length}`;
            const progress = (gameState.completed.length / puzzles.length) * 100;
            elements.progressBar.style.width = progress + '%';

            // Render emojis
            elements.emojiContainer.innerHTML = '';
            gameState.currentPuzzle.emojis.forEach(emoji => {
                const box = document.createElement('div');
                box.className = 'emoji-box w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center text-4xl border border-white/30';
                box.textContent = emoji;
                elements.emojiContainer.appendChild(box);
            });

            // Render answer slots
            elements.answerContainer.innerHTML = '';
            for (let i = 0; i < gameState.currentPuzzle.answer.length; i++) {
                const slot = document.createElement('div');
                slot.className = `w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center border-2 ${gameState.currentAnswer[i] ? 'border-yellow-300 bg-white/30' : 'border-white/30'}`;
                if (gameState.currentAnswer[i]) {
                    slot.textContent = gameState.currentAnswer[i];
                    slot.className += ' text-2xl font-bold text-white answer-char';
                }
                slot.dataset.index = i;
                if (gameState.currentAnswer[i]) {
                    slot.addEventListener('click', () => removeChar(i));
                }
                elements.answerContainer.appendChild(slot);
            }

            // Render keyboard
            renderKeyboard();
        }

        function renderKeyboard() {
            elements.keyboardContainer.innerHTML = '';
            // Split into rows of up to 6 characters
            const rows = [];
            for (let i = 0; i < gameState.shuffledChars.length; i += 6) {
                rows.push(gameState.shuffledChars.slice(i, i + 6));
            }
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-2 justify-center';
                row.forEach(char => {
                    const button = document.createElement('button');
                    button.className = 'keyboard-key w-14 h-14 bg-white/20 rounded-lg text-xl font-semibold text-white border border-white/30 hover:bg-white/30 transition-colors';
                    button.textContent = char;
                    button.addEventListener('click', () => addChar(char));
                    rowDiv.appendChild(button);
                });
                elements.keyboardContainer.appendChild(rowDiv);
            });
        }

        function addChar(char) {
            const emptyIndex = gameState.currentAnswer.findIndex(c => !c);
            if (emptyIndex !== -1) {
                gameState.currentAnswer[emptyIndex] = char;
                // Remove from shuffled chars
                const shuffledIndex = gameState.shuffledChars.indexOf(char);
                if (shuffledIndex !== -1) {
                    gameState.shuffledChars.splice(shuffledIndex, 1);
                }
                render();
                checkAnswer();
            }
        }

        function removeChar(index) {
            const char = gameState.currentAnswer[index];
            if (char) {
                gameState.currentAnswer[index] = null;
                gameState.shuffledChars.push(char);
                gameState.shuffledChars = shuffleChars(gameState.shuffledChars.filter(c => c));
                render();
            }
        }

        function checkAnswer() {
            if (gameState.currentAnswer.every(c => c)) {
                const userAnswer = gameState.currentAnswer.join('');
                if (userAnswer === gameState.currentPuzzle.answer) {
                    // Correct!
                    if (!gameState.completed.includes(gameState.currentLevel)) {
                        gameState.completed.push(gameState.currentLevel);
                        saveProgress();
                    }
                    showWinModal();
                }
            }
        }

        function showWinModal() {
            if (gameState.currentLevel === puzzles.length - 1 && gameState.completed.length === puzzles.length) {
                elements.winTitle.textContent = '🎉 恭喜通关全部关卡！';
                elements.winMessage.textContent = `你太厉害了！成功猜出了所有 ${puzzles.length} 个成语！`;
                elements.nextLevel.textContent = '重新开始';
            } else {
                elements.winTitle.textContent = '恭喜过关！';
                elements.winMessage.textContent = `正确答案是：${gameState.currentPuzzle.answer}`;
                elements.nextLevel.textContent = '下一关';
            }
            elements.winModal.classList.remove('hidden');
        }

        function showLevelSelect() {
            elements.levelGrid.innerHTML = '';
            puzzles.forEach((_, index) => {
                const button = document.createElement('button');
                let className = 'level-item w-12 h-12 rounded-lg border-2 font-semibold ';
                if (gameState.completed.includes(index)) {
                    className += 'completed text-green-300';
                } else if (index === gameState.currentLevel) {
                    className += 'current text-blue-300';
                } else {
                    className += 'bg-white/10 border-white/30 text-white hover:bg-white/20';
                }
                button.className = className;
                button.textContent = index + 1;
                button.addEventListener('click', () => {
                    startLevel(index);
                    elements.levelModal.classList.add('hidden');
                });
                elements.levelGrid.appendChild(button);
            });
            elements.levelModal.classList.remove('hidden');
        }

        function giveHint() {
            // Find first empty slot and reveal one character
            const emptyIndex = gameState.currentAnswer.findIndex(c => !c);
            if (emptyIndex === -1) return;
            
            const correctChar = gameState.currentPuzzle.answer[emptyIndex];
            addChar(correctChar);
        }

        function skipLevel() {
            if (!gameState.completed.includes(gameState.currentLevel)) {
                gameState.completed.push(gameState.currentLevel);
                saveProgress();
            }
            nextLevel();
        }

        function nextLevel() {
            elements.winModal.classList.add('hidden');
            let next = gameState.currentLevel + 1;
            if (next >= puzzles.length) {
                next = 0;
            }
            startLevel(next);
        }

        // Event bindings
        elements.levelSelectBtn.addEventListener('click', showLevelSelect);
        elements.closeModal.addEventListener('click', () => elements.levelModal.classList.add('hidden'));
        elements.levelModal.addEventListener('click', (e) => {
            if (e.target === elements.levelModal) {
                elements.levelModal.classList.add('hidden');
            }
        });
        elements.nextLevel.addEventListener('click', nextLevel);
        elements.hintBtn.addEventListener('click', giveHint);
        elements.skipBtn.addEventListener('click', skipLevel);
        elements.winModal.addEventListener('click', (e) => {
            if (e.target === elements.winModal) {
                elements.winModal.classList.add('hidden');
            }
        });

        // Start game
        loadProgress();
        startLevel(0);
    </script>
</body>
</html>
