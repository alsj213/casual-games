<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物叠叠乐 - Food Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Segoe UI', sans-serif;
            padding: 10px;
        }
        .game-container {
            text-align: center;
            max-width: 90vw;
        }
        h1 {
            color: #d63031;
            margin-bottom: 8px;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }
        .subtitle {
            color: #e17055;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .game-area {
            background: white;
            border: 3px solid #fab1a0;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(to bottom, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }
        .score-item {
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            color: white;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(232, 67, 147, 0.3);
        }
        .score-item span {
            font-weight: bold;
            margin-left: 4px;
        }
        .best-score {
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
        .btn {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 67, 147, 0.6);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
        }
        .instructions {
            color: #b2bec3;
            font-size: 12px;
            margin-top: 10px;
            line-height: 1.5;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            display: none;
        }
        .game-over.active {
            display: flex;
        }
        .game-over-modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .game-over-modal h2 {
            color: #d63031;
            margin-bottom: 15px;
        }
        .game-over-stats {
            margin-bottom: 20px;
            color: #636e72;
        }
        .food-emoji {
            font-size: 60px;
            margin-bottom: 10px;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        @media (max-width: 600px) {
            #gameCanvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍔 食物叠叠乐</h1>
        <p class="subtitle">解压休闲堆叠游戏，看准时机放下食物，挑战最高堆叠！</p>
        
        <div class="game-area">
            <div class="score-board">
                <div class="score-item">
                    当前得分: <span id="score">0</span>
                </div>
                <div class="score-item best-score">
                    最高堆叠: <span id="bestScore">0</span>
                </div>
            </div>

            <canvas id="gameCanvas" width="400" height="500"></canvas>

            <div class="controls">
                <button class="btn btn-primary" onclick="startGame()">新游戏</button>
                <button class="btn btn-secondary" onclick="toggleSound()">音效: <span id="soundText">开</span></button>
            </div>

            <p class="instructions">
                <strong>玩法:</strong> 点击屏幕或按空格键放下移动的食物，尽量对齐堆叠。掉下去游戏结束，叠得越高得分越高！<br>
                不同形状的美食，考验你的时机判断，越堆越高挑战你的极限！
            </p>

            <div class="game-over" id="gameOver">
                <div class="game-over-modal">
                    <div class="food-emoji">🍕</div>
                    <h2>游戏结束</h2>
                    <div class="game-over-stats">
                        <p>你的堆叠高度: <strong id="finalScore">0</strong> 层</p>
                        <p>最高记录: <strong id="finalBest">0</strong> 层</p>
                    </div>
                    <button class="btn btn-primary" onclick="restartGame()">再玩一次</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const GROUND_Y = HEIGHT - 50;

        // 食物列表（不同形状）
        const FOODS = [
            { emoji: '🍕', name: '披萨', width: 60, height: 40, color: '#FF6B6B' },
            { emoji: '🍔', name: '汉堡', width: 50, height: 50, color: '#FFA07A' },
            { emoji: '🌭', name: '热狗', width: 65, height: 35, color: '#F4A460' },
            { emoji: '🌮', name: '塔可', width: 55, height: 45, color: '#CD853F' },
            { emoji: '🍣', name: '寿司', width: 45, height: 30, color: '#98FB98' },
            { emoji: '🍜', name: '拉面', width: 70, height: 30, color: '#FFD700' },
            { emoji: '🍦', name: '冰淇淋', width: 40, height: 55, color: '#FFB6C1' },
            { emoji: '🍩', name: '甜甜圈', width: 48, height: 48, color: '#EE82EE' },
            { emoji: '🍎', name: '苹果', width: 42, height: 42, color: '#FF6347' },
            { emoji: '🍌', name: '香蕉', width: 68, height: 28, color: '#FFD700' },
            { emoji: '🍪', name: '饼干', width: 45, height: 45, color: '#DEB887' },
            { emoji: '🎂', name: '蛋糕', width: 58, height: 52, color: '#DDA0DD' },
        ];

        // 食物颜色对应（绘制用）
        const FOOD_COLORS = {
            '🍕': '#FF6B6B',
            '🍔': '#FFA07A', 
            '🌭': '#F4A460',
            '🌮': '#CD853F',
            '🍣': '#98FB98',
            '🍜': '#FFD700',
            '🍦': '#FFB6C1',
            '🍩': '#EE82EE',
            '🍎': '#FF6347',
            '🍌': '#FFD700',
            '🍪': '#DEB887',
            '🎂': '#DDA0DD',
        };

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let bestScore = localStorage.getItem('foodStackBest') || 0;
        let stacks = [];
        let currentFood = null;
        let currentX = 0;
        let currentY = 0;
        let direction = 1; // 1 right, -1 left
        let speed = 2;
        let soundOn = true;
        let animationId = null;

        // 初始化
        document.getElementById('bestScore').textContent = bestScore;
        document.getElementById('soundText').textContent = soundOn ? '开' : '关';

        // 随机获取一个食物
        function getRandomFood() {
            return FOODS[Math.floor(Math.random() * FOODS.length)];
        }

        // 开始新游戏
        function startGame() {
            score = 0;
            stacks = [];
            gameRunning = true;
            document.getElementById('gameOver').classList.remove('active');
            
            // 第一层基础平台
            const baseFood = {
                ...FOODS[0],
                x: WIDTH / 2 - 40,
                y: GROUND_Y - 40,
                width: 80
            };
            stacks.push(baseFood);
            
            // 生成第一个待放置食物
            spawnNewFood();
            updateScore();
            gameLoop();
        }

        // 生成新的待放置食物
        function spawnNewFood() {
            currentFood = getRandomFood();
            currentX = 0;
            currentY = stacks.length > 0 ? stacks[stacks.length - 1].y - currentFood.height : 100;
            direction = Math.random() > 0.5 ? 1 : -1;
            speed = 2 + Math.floor(score / 10) * 0.5;
        }

        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
        }

        // 放下当前食物
        function dropFood() {
            if (!gameRunning) return;

            const prevStack = stacks[stacks.length - 1];
            const foodWidth = currentFood.width;
            const foodX = currentX;
            const foodY = prevStack.y - currentFood.height;

            // 检查重叠
            const overlapLeft = Math.max(foodX, prevStack.x);
            const overlapRight = Math.min(foodX + foodWidth, prevStack.x + prevStack.width);
            
            if (overlapRight <= overlapLeft) {
                // 没有重叠，食物掉下去，游戏结束
                gameOver();
                return;
            }

            // 计算新宽度（重叠后的宽度）
            const newWidth = overlapRight - overlapLeft;
            const newX = overlapLeft;
            
            stacks.push({
                ...currentFood,
                x: newX,
                y: foodY,
                width: newWidth
            });

            score++;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('foodStackBest', bestScore);
            }
            
            updateScore();
            spawnNewFood();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalBest').textContent = bestScore;
            document.getElementById('gameOver').classList.add('active');
        }

        // 重新开始
        function restartGame() {
            startGame();
        }

        // 切换音效
        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('soundText').textContent = soundOn ? '开' : '关';
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // 绘制地面
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, GROUND_Y, WIDTH, 10);

            // 绘制已堆叠的食物
            stacks.forEach((food, index) => {
                drawFood(food, index);
            });

            // 绘制当前正在移动的食物
            if (gameRunning && currentFood) {
                drawFoodShape(currentX, currentY, currentFood.width, currentFood.height, FOOD_COLORS[currentFood.emoji] || currentFood.color);
                // 绘制食物 emoji
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(currentFood.emoji, currentX + currentFood.width / 2, currentY + currentFood.height / 2);
            }

            // 绘制预览线
            if (gameRunning) {
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(currentX + currentFood.width / 2, 0);
                ctx.lineTo(currentX + currentFood.width / 2, HEIGHT);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // 绘制一个食物
        function drawFood(food, index) {
            drawFoodShape(food.x, food.y, food.width, food.height, FOOD_COLORS[food.emoji] || food.color);
            // 绘制 emoji
            ctx.font = Math.min(30, foodwidth - 4) + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(food.emoji, food.x + food.width / 2, food.y + food.height / 2);
        }

        // 绘制食物形状
        function drawFoodShape(x, y, width, height, color) {
            ctx.fillStyle = color;
            roundRect(ctx, x, y, width, height, 8, true, false);
            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.ellipse(x + width * 0.3, y + height * 0.3, width * 0.25, height * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 圆角矩形绘制
        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + width, y, x + width, y + height, radius);
            ctx.arcTo(x + width, y + height, x, y + height, radius);
            ctx.arcTo(x, y + height, x, y, radius);
            ctx.arcTo(x, y, x + width, y, radius);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;

            // 移动当前食物
            currentX += direction * speed;
            
            // 碰壁反弹
            if (currentX <= 0 || currentX + currentFood.width >= WIDTH) {
                direction *= -1;
                // 保持在边界内
                currentX = Math.max(0, Math.min(currentX, WIDTH - currentFood.width));
            }

            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // 点击放下食物
        canvas.addEventListener('click', () => {
            if (gameRunning) {
                dropFood();
            }
        });

        // 空格键放下食物
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    dropFood();
                } else {
                    startGame();
                }
            }
        });

        // 触摸支持移动端
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                dropFood();
            }
        }, { passive: false });

        // 初始绘制
        draw();
        // 开始游戏
        startGame();
    </script>
</body>
</html>
