<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水果切片拼图 - Fruit Slice Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 90vw;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            gap: 20px;
        }
        .stat {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .stat span {
            color: #d81b60;
        }
        .canvas-container {
            position: relative;
            margin: 0 auto 15px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        #gameCanvas {
            display: block;
            background: #f8f8f8;
            cursor: grab;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px 24px;
            font-size: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
        .btn-secondary {
            background: linear-gradient(135dx, #a8edea 0%, #fed6ab 100%);
            color: #333;
        }
        .btn-level {
            padding: 8px 16px;
            font-size: 13px;
        }
        .btn-level.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }
        .level-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .instructions {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .puzzle-piece {
            transition: transform 0.15s ease-out;
        }
        .puzzle-piece.dragging {
            transform: scale(1.05);
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
        }
        .game-over.active {
            display: flex;
        }
        .result-modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .result-modal h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .stars {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .star {
            color: #ddd;
            transition: color 0.5s;
        }
        .star.filled {
            color: #ffd700;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 1;
            animation: particle-fall 1s ease-out forwards;
        }
        @keyframes particle-fall {
            to {
                transform: translateY(80px) rotate(360deg);
                opacity: 0;
            }
        }
        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: firework-explode 1s ease-out forwards;
        }
        @keyframes firework-explode {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1);
                opacity: 0;
            }
        }
        @media (max-width: 600px) {
            #gameCanvas {
                width: 100%;
                height: auto;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍉 水果切片拼图</h1>
        <p class="subtitle">把切碎的水果拼回去！拖动碎片还原完整水果</p>
        
        <div class="stats-bar">
            <div class="stat">步数: <span id="moveCount">0</span></div>
            <div class="stat">时间: <span id="timeCount">0</span>s</div>
        </div>

        <div class="level-selector" id="levelSelector">
            <!-- Level buttons will be generated by JS -->
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            <div class="game-over" id="gameOver">
                <div class="result-modal">
                    <h2>🎉 拼图完成！</h2>
                    <div class="stars" id="stars"></div>
                    <button class="btn btn-primary" onclick="startLevel(currentLevel)">再来一局</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="startLevel(currentLevel)">重新开始</button>
            <button class="btn btn-secondary" onclick="resetZoom()">重置视角</button>
        </div>

        <p class="instructions">
            <strong>玩法：</strong> 拖动碎片放到正确位置，靠近目标位置会自动吸附。拼得越快步数越少，星级越高！
        </p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        // Game state
        let currentLevel = 0;
        let pieces = [];
        let moves = 0;
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let draggingPiece = null;
        let dragOffset = {x: 0, y: 0};
        let cameraOffset = {x: 0, y: 0};
        let isDragging = false;
        let particles = [];
        let fireworks = [];

        // Level definitions
        const LEVELS = [
            {
                name: '苹果',
                numPieces: 4,
                color: '#ff3b30',
                outline: [
                    {x: 240, y: 120, r: 90}
                ],
                seeded: false
            },
            {
                name: '西瓜',
                numPieces: 6,
                color: '#2ecc71',
                outline: [
                    {x: 240, y: 200, r: 180, w: 360, h: 160}
                ],
                seeded: false
            },
            {
                name: '橙子',
                numPieces: 8,
                color: '#ff9800',
                outline: [
                    {x: 240, y: 240, r: 160}
                ],
                seeded: false
            },
            {
                name: '柠檬',
                numPieces: 9,
                color: '#ffeb3b',
                outline: [
                    {x: 200, y: 200, w: 200, h: 160, oval: true}
                ],
                seeded: false
            },
            {
                name: '草莓',
                numPieces: 12,
                color: '#e91e63',
                outline: [
                    {x: 240, y: 220, r: 140}
                ],
                seeded: false
            }
        ];

        // Puzzle Piece class
        class PuzzlePiece {
            constructor(id, originalX, originalY, width, height, targetX, targetY) {
                this.id = id;
                this.x = originalX;
                this.y = originalY;
                this.width = width;
                this.height = height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.snapped = false;
                this.imageData = null;
            }

            captureImage() {
                // Capture the image from the target area
                this.imageData = ctx.getImageData(this.targetX, this.targetY, this.width, this.height);
            }

            draw() {
                if (this.imageData) {
                    ctx.putImageData(this.imageData, this.x, this.y);
                }
                // Draw border
                ctx.strokeStyle = this.snapped ? 'rgba(0, 150, 0, 0.5)' : 'rgba(0, 0, 0, 0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }

            isPointInside(x, y) {
                return x >= this.x && x <= this.x + this.width &&
                       y >= this.y && y <= this.y + this.height;
            }

            checkSnap(snapDistance = 30) {
                const dx = Math.abs(this.x - this.targetX);
                const dy = Math.abs(this.y - this.targetY);
                if (dx < snapDistance && dy < snapDistance) {
                    this.x = this.targetX;
                    this.y = this.targetY;
                    if (!this.snapped) {
                        this.snapped = true;
                        createSliceParticles(this.targetX + this.width/2, this.targetY + this.height/2, LEVELS[currentLevel].color);
                        moves++;
                        updateStats();
                    }
                    return true;
                }
                return false;
            }
        }

        // Generate random slice cuts
        function generatePuzzle(levelIndex) {
            const level = LEVELS[levelIndex];
            pieces = [];
            moves = 0;
            particles = [];
            fireworks = [];
            
            // Clear canvas
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Draw base fruit
            drawCompleteFruit(levelIndex);

            // Generate sliced pieces
            const numPieces = level.numPieces;
            let placedPieces = 0;
            const margin = 40;
            
            // Create random cuts
            if (level.name === '西瓜') {
                // Half watermelon
                drawWatermelon(level.color);
            } else if (level.name === '草莓') {
                drawStrawberry(level.color);
            } else if (level.name === '柠檬') {
                drawLemon(level.color);
            } else if (level.name === '橙子') {
                drawCircleFruit(level.color, 240, 240, 160);
            } else if (level.name === '苹果') {
                drawApple(level.color);
            }

            // Cut into random pieces by splitting with random lines
            let piecesList = [];
            
            if (numPieces <= 4) {
                // 2x2 grid
                const w = Math.floor(WIDTH / 2);
                const h = Math.floor(HEIGHT / 2);
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        const tx = col * w;
                        const ty = row * h;
                        const ox = tx + (Math.random() - 0.5) * 80;
                        const oy = ty + (Math.random() - 0.5) * 80 + margin * levelIndex;
                        pieces.push(new PuzzlePiece(placedPieces++, ox, oy, w, h, tx, ty));
                    }
                }
            } else if (numPieces <= 8) {
                // 3x3 grid with random offsets
                const w = Math.floor(WIDTH / 3);
                const h = Math.floor(HEIGHT / 3);
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        if (placedPieces >= numPieces) break;
                        const tx = col * w;
                        const ty = row * h;
                        const pieceW = col === 2 ? WIDTH - tx : w;
                        const pieceH = row === 2 ? HEIGHT - ty : h;
                        const ox = tx + (Math.random() - 0.5) * 100;
                        const oy = ty + (Math.random() - 0.5) * 100 + margin * levelIndex;
                        pieces.push(new PuzzlePiece(placedPieces++, ox, oy, pieceW, pieceH, tx, ty));
                    }
                }
            } else {
                // 4x3 grid = 12 pieces
                const w = Math.floor(WIDTH / 4);
                const h = Math.floor(HEIGHT / 3);
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 4; col++) {
                        const tx = col * w;
                        const ty = row * h;
                        const pieceW = col === 3 ? WIDTH - tx : w;
                        const pieceH = row === 2 ? HEIGHT - ty : h;
                        const ox = tx + (Math.random() - 0.5) * 120;
                        const oy = ty + (Math.random() - 0.5) * 120 + margin * levelIndex;
                        pieces.push(new PuzzlePiece(placedPieces++, ox, oy, pieceW, pieceH, tx, ty));
                    }
                }
            }

            // Capture each piece's image
            pieces.forEach(piece => piece.captureImage());

            // Clear canvas and reset positions (they're already stored)
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            cameraOffset = {x: 0, y: 0};
            
            // Start timer
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            updateStats();
        }

        function drawCompleteFruit(levelIndex) {
            const level = LEVELS[levelIndex];
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            switch (level.name) {
                case '苹果':
                    drawApple(level.color);
                    break;
                case '西瓜':
                    drawWatermelon(level.color);
                    break;
                case '橙子':
                    drawCircleFruit(level.color, 240, 240, 160);
                    break;
                case '柠檬':
                    drawLemon(level.color);
                    break;
                case '草莓':
                    drawStrawberry(level.color);
                    break;
            }
        }

        function drawApple(color) {
            // Apple shape
            ctx.beginPath();
            ctx.arc(180, 200, 80, 0, Math.PI * 2);
            ctx.arc(300, 200, 80, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            // Stem
            ctx.beginPath();
            ctx.moveTo(240, 100);
            ctx.quadraticCurveTo(250, 70, 260, 60);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#5d4037';
            ctx.stroke();
            // Leaf
            ctx.beginPath();
            ctx.ellipse(265, 55, 20, 12, -0.5, 0, Math.PI * 2);
            ctx.fillStyle = '#4caf50';
            ctx.fill();
        }

        function drawWatermelon(rindColor) {
            // Half watermelon
            ctx.beginPath();
            ctx.moveTo(60, 200);
            ctx.quadraticCurveTo(240, 60, 420, 200);
            ctx.lineWidth = 20;
            ctx.strokeStyle = rindColor;
            ctx.stroke();
            // Flesh
            ctx.beginPath();
            ctx.moveTo(60, 200);
            ctx.quadraticCurveTo(240, 60, 420, 200);
            ctx.lineWidth = 16;
            ctx.strokeStyle = '#ff5252';
            ctx.stroke();
            // Seeds
            ctx.fillStyle = '#212121';
            for (let i = 0; i < 15; i++) {
                const x = 80 + i * 25;
                const y = 190 + Math.sin(i * 0.8) * 20;
                ctx.beginPath();
                ctx.ellipse(x, y, 4, 6, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawLemon(yellow) {
            ctx.beginPath();
            ctx.ellipse(290, 220, 90, 65, 0.5, 0, Math.PI * 2);
            ctx.fillStyle = yellow;
            ctx.fill();
            ctx.strokeStyle = '#fbc02d';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Stem
            ctx.beginPath();
            ctx.moveTo(340, 180);
            ctx.quadraticCurveTo(360, 160, 370, 145);
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#5d4037';
            ctx.stroke();
        }

        function drawCircleFruit(color, cx, cy, r) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = darkenColor(color, 0.2);
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawStrawberry(color) {
            // Heart shape strawberry
            ctx.beginPath();
            ctx.moveTo(240, 320);
            ctx.bezierCurveTo(240, 320, 160, 240, 160, 160);
            ctx.bezierCurveTo(160, 120, 200, 80, 240, 80);
            ctx.bezierCurveTo(280, 80, 320, 120, 320, 160);
            ctx.bezierCurveTo(320, 240, 240, 320, 240, 320);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = darkenColor(color, 0.2);
            ctx.lineWidth = 2;
            ctx.stroke();
            // Seeds
            ctx.fillStyle = '#212121';
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 1.2 + 0.3;
                const r = 60 + Math.random() * 80;
                const x = 240 + Math.cos(angle) * r;
                const y = 160 + Math.sin(angle) * r;
                ctx.beginPath();
                ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            // Leaf
            ctx.beginPath();
            ctx.moveTo(240, 80);
            ctx.quadraticCurveTo(220, 50, 200, 30);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#4caf50';
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(200, 30, 15, 8, -0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#4caf50';
            ctx.fill();
        }

        function darkenColor(color, factor) {
            // Simple darken - this is a quick hack
            if (color.startsWith('#')) {
                const num = parseInt(color.slice(1), 16);
                const r = Math.max(0, ((num >> 16) & 255) * (1 - factor));
                const g = Math.max(0, (((num >> 8) & 255)) * (1 - factor));
                const b = Math.max(0, ((num >> 0) & 255) * (1 - factor));
                return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
            }
            return color;
        }

        function createSliceParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = 4 + Math.random() * 8;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = (x - size/2) + 'px';
                particle.style.top = (y - size/2) + 'px';
                particle.style.background = color;
                document.getElementById('canvasContainer').appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function createFireworks() {
            const centerX = WIDTH / 2;
            const centerY = HEIGHT / 2;
            const container = document.getElementById('canvasContainer');
            
            for (let i = 0; i < 50; i++) {
                const fw = document.createElement('div');
                fw.className = 'firework';
                const angle = (Math.PI * 2 * i) / 50;
                const distance = 150 + Math.random() * 100;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                fw.style.left = centerX + 'px';
                fw.style.top = centerY + 'px';
                fw.style.background = getRandomFireworkColor();
                fw.style.setProperty('--dx', dx + 'px');
                fw.style.setProperty('--dy', dy + 'px');
                container.appendChild(fw);
                setTimeout(() => fw.remove(), 1000);
            }

            for (let j = 0; j < 3; j++) {
                setTimeout(() => {
                    const cx = centerX + (Math.random() - 0.5) * 200;
                    const cy = centerY + (Math.random() - 0.5) * 100;
                    for (let i = 0; i < 30; i++) {
                        const fw = document.createElement('div');
                        fw.className = 'firework';
                        const angle = (Math.PI * 2 * i) / 30;
                        const distance = 80 + Math.random() * 120;
                        const dx = Math.cos(angle) * distance;
                        const dy = Math.sin(angle) * distance;
                        fw.style.left = cx + 'px';
                        fw.style.top = cy + 'px';
                        fw.style.background = getRandomFireworkColor();
                        fw.style.setProperty('--dx', dx + 'px');
                        fw.style.setProperty('--dy', dy + 'px');
                        container.appendChild(fw);
                        setTimeout(() => fw.remove(), 1000);
                    }
                }, j * 300);
            }
        }

        function getRandomFireworkColor() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff', '#ffa500'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Draw target grid faintly for reference
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 1;
            pieces.forEach(piece => {
                if (!piece.snapped) {
                    ctx.strokeRect(piece.targetX, piece.targetY, piece.width, piece.height);
                }
            });

            // Draw pieces
            pieces.forEach(piece => piece.draw());

            // Draw any particles
            particles.forEach(p => {
                // canvas particles are not used, using DOM particles
            });
        }

        function checkGameComplete() {
            const allSnapped = pieces.every(p => p.snapped);
            if (allSnapped && pieces.length > 0) {
                // Game complete
                if (timerInterval) clearInterval(timerInterval);
                elapsedTime = Math.floor((Date.now() - startTime) / 1000);
                createFireworks();
                showResult();
            }
        }

        function showResult() {
            const totalPieces = pieces.length;
            const perfectMoves = totalPieces;
            let stars = 0;

            if (moves <= perfectMoves + 2 && elapsedTime <= 180) stars = 3;
            else if (moves <= perfectMoves + 5 && elapsedTime <= 300) stars = 2;
            else stars = 1;

            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const klass = i < stars ? 'star filled' : 'star';
                starsContainer.innerHTML += `<span class="${klass}">⭐</span>`;
            }

            document.getElementById('gameOver').classList.add('active');
        }

        function updateStats() {
            document.getElementById('moveCount').textContent = moves;
            updateTimer();
        }

        function updateTimer() {
            if (startTime > 0) {
                elapsedTime = Math.floor((Date.now() - startTime) / 1000);
            }
            document.getElementById('timeCount').textContent = elapsedTime;
        }

        function startLevel(levelIndex) {
            currentLevel = levelIndex;
            document.getElementById('gameOver').classList.remove('active');
            // Remove all existing particles
            document.querySelectorAll('.particle, .firework').forEach(el => el.remove());
            generatePuzzle(levelIndex);
            draw();

            // Update active level button
            document.querySelectorAll('.btn-level').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === levelIndex);
            });
        }

        function resetZoom() {
            cameraOffset = {x: 0, y: 0};
            draw();
        }

        // Mouse / Touch event handlers
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX + cameraOffset.x,
                y: (e.clientY - rect.top) * scaleY + cameraOffset.y
            };
        }

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            return {
                x: (touch.clientX - rect.left) * scaleX + cameraOffset.x,
                y: (touch.clientY - rect.top) * scaleY + cameraOffset.y
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (document.getElementById('gameOver').classList.contains('active')) return;
            const pos = getMousePos(e);
            // Find clicked piece (reverse order to grab top piece)
            for (let i = pieces.length - 1; i >= 0; i--) {
                const piece = pieces[i];
                if (!piece.snapped && piece.isPointInside(pos.x, pos.y)) {
                    draggingPiece = piece;
                    isDragging = true;
                    dragOffset.x = pos.x - piece.x;
                    dragOffset.y = pos.y - piece.y;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !draggingPiece) return;
            const pos = getMousePos(e);
            draggingPiece.x = pos.x - dragOffset.x;
            draggingPiece.y = pos.y - dragOffset.y;
            draw();
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDragging || !draggingPiece) return;
            if (!draggingPiece.snapped) {
                draggingPiece.checkSnap();
                checkGameComplete();
            }
            isDragging = false;
            draggingPiece = null;
            draw();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (document.getElementById('gameOver').classList.contains('active')) return;
            const pos = getTouchPos(e);
            for (let i = pieces.length - 1; i >= 0; i--) {
                const piece = pieces[i];
                if (!piece.snapped && piece.isPointInside(pos.x, pos.y)) {
                    draggingPiece = piece;
                    isDragging = true;
                    dragOffset.x = pos.x - piece.x;
                    dragOffset.y = pos.y - piece.y;
                    break;
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDragging || !draggingPiece) return;
            const pos = getTouchPos(e);
            draggingPiece.x = pos.x - dragOffset.x;
            draggingPiece.y = pos.y - dragOffset.y;
            draw();
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!isDragging || !draggingPiece) return;
            if (!draggingPiece.snapped) {
                draggingPiece.checkSnap();
                checkGameComplete();
            }
            isDragging = false;
            draggingPiece = null;
            draw();
        });

        // Initialize level selector
        function initLevelSelector() {
            const container = document.getElementById('levelSelector');
            LEVELS.forEach((level, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-level' + (index === 0 ? ' active' : '');
                btn.textContent = level.name;
                btn.onclick = () => startLevel(index);
                container.appendChild(btn);
            });
        }

        // Start game
        initLevelSelector();
        startLevel(0);
    </script>
</body>
</html>
