<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加载大作战 - Casual Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .progress-container {
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .progress-container.active {
            border-color: #48dbfb;
            box-shadow: 0 0 15px rgba(72, 219, 251, 0.3);
        }
        .progress-container.winner {
            border-color: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            background: rgba(46, 204, 113, 0.1);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .player-name {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .player-name.you { color: #48dbfb; }
        .player-name.ai { color: #a0a0a0; }
        .progress-percent {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .progress-bar-bg {
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .progress-container.active .progress-bar-bg {
            cursor: pointer;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 0.1s linear;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .progress-bar-fill.player { background: linear-gradient(90deg, #48dbfb, #0abde3); }
        .progress-bar-fill.ai1 { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .progress-bar-fill.ai2 { background: linear-gradient(90deg, #feca57, #ff9f43); }
        .progress-bar-fill.ai3 { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }
        .item-popup {
            position: absolute;
            font-size: 1.5rem;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .click-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(72, 219, 251, 0.5);
            animation: clickPulse 0.3s ease-out forwards;
            pointer-events: none;
        }
        @keyframes clickPulse {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 10px;
        }
        .btn-start { background: linear-gradient(45deg, #2ecc71, #27ae60); color: white; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .btn-reset { background: linear-gradient(45deg, #e74c3c, #c0392b); color: white; }
        .btn-reset:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            text-align: center;
            font-size: 1.2rem;
            margin: 15px 0;
            min-height: 30px;
            color: #feca57;
        }
        .item-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #a0a0a0;
        }
        .legend-item span:first-child { font-size: 1.2rem; }
        .difficulty-select {
            text-align: center;
            margin: 15px 0;
        }
        .difficulty-select label {
            margin-right: 15px;
            cursor: pointer;
        }
        .difficulty-select input { margin-right: 5px; }
        .winner-announcement {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        .score-board {
            text-align: center;
            margin: 15px 0;
            font-size: 1.1rem;
        }
        .score-board span { margin: 0 15px; }
        .score-board .wins { color: #2ecc71; }
        .score-board .losses { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏁 加载大作战</h1>
        <p class="subtitle">点击加速你的进度条，第一个冲到终点获胜！</p>
        
        <div class="score-board">
            <span class="wins">🏆 胜利: <span id="wins">0</span></span>
            <span class="losses">💀 失败: <span id="losses">0</span></span>
        </div>
        
        <div class="difficulty-select">
            <label><input type="radio" name="difficulty" value="easy" checked> 简单</label>
            <label><input type="radio" name="difficulty" value="medium"> 中等</label>
            <label><input type="radio" name="difficulty" value="hard"> 困难</label>
        </div>
        
        <div id="progress-bars">
            <!-- Progress bars will be generated here -->
        </div>
        
        <div class="status" id="status">点击"开始游戏"开始！</div>
        
        <div class="item-legend">
            <div class="legend-item"><span>🚀</span> 加速</div>
            <div class="legend-item"><span>⚡</span> 双倍</div>
            <div class="legend-item"><span>🔄</span> 随机跳跃</div>
            <div class="legend-item"><span>🐌</span> 减速</div>
            <div class="legend-item"><span>⏸️</span> 暂停</div>
            <div class="legend-item"><span>🔙</span> 后退</div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-reset" id="resetBtn">重置</button>
        </div>
    </div>

    <script>
        const PLAYER_COUNT = 4;
        const PLAYER_NAMES = ['你', 'AI-小红', 'AI-小黄', 'AI-小紫'];
        const PLAYER_CLASSES = ['player', 'ai1', 'ai2', 'ai3'];
        
        // 道具系统
        const ITEMS = {
            boost: { emoji: '🚀', name: '加速', effect: 15, type: 'positive' },
            double: { emoji: '⚡', name: '双倍加速', effect: 0, type: 'positive', special: 'double' },
            jump: { emoji: '🔄', name: '随机跳跃', effect: 0, type: 'random' },
            slow: { emoji: '🐌', name: '减速', effect: -10, type: 'negative' },
            freeze: { emoji: '⏸️', name: '暂停', effect: 0, type: 'negative', special: 'freeze' },
            backward: { emoji: '🔙', name: '后退', effect: -20, type: 'negative' }
        };
        
        const ITEM_LIST = Object.keys(ITEMS);
        const POSITIVE_ITEMS = ITEM_LIST.filter(k => ITEMS[k].type === 'positive' || ITEMS[k].type === 'random');
        const NEGATIVE_ITEMS = ITEM_LIST.filter(k => ITEMS[k].type === 'negative');
        
        let gameState = {
            running: false,
            progress: [0, 0, 0, 0],
            speed: [0, 0, 0, 0],
            baseSpeed: [0, 0, 0, 0],
            frozen: [false, false, false, false],
            doubleBoost: [false, false, false, false],
            winner: -1,
            wins: 0,
            losses: 0,
            itemTimers: [null, null, null, null],
            lastItemTime: [0, 0, 0, 0],
            animationId: null
        };
        
        const progressBars = document.getElementById('progress-bars');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const winsDisplay = document.getElementById('wins');
        const lossesDisplay = document.getElementById('losses');
        
        // 初始化进度条
        function initProgressBars() {
            progressBars.innerHTML = '';
            for (let i = 0; i < PLAYER_COUNT; i++) {
                const container = document.createElement('div');
                container.className = `progress-container${i === 0 ? ' active' : ''}`;
                container.id = `player-${i}`;
                
                const info = document.createElement('div');
                info.className = 'progress-info';
                
                const name = document.createElement('div');
                name.className = `player-name ${i === 0 ? 'you' : 'ai'}`;
                name.textContent = PLAYER_NAMES[i];
                
                const percent = document.createElement('div');
                percent.className = 'progress-percent';
                percent.id = `percent-${i}`;
                percent.textContent = '0%';
                
                info.appendChild(name);
                info.appendChild(percent);
                
                const barBg = document.createElement('div');
                barBg.className = 'progress-bar-bg';
                barBg.id = `bar-bg-${i}`;
                if (i === 0) {
                    barBg.addEventListener('click', handlePlayerClick);
                    barBg.addEventListener('touchstart', handlePlayerTouch, { passive: false });
                }
                
                const barFill = document.createElement('div');
                barFill.className = `progress-bar-fill ${PLAYER_CLASSES[i]}`;
                barFill.id = `bar-fill-${i}`;
                barFill.style.width = '0%';
                
                barBg.appendChild(barFill);
                container.appendChild(info);
                container.appendChild(barBg);
                progressBars.appendChild(container);
            }
        }
        
        // 获取难度设置
        function getDifficulty() {
            const selected = document.querySelector('input[name="difficulty"]:checked').value;
            switch(selected) {
                case 'easy': return { aiSpeed: 0.8, itemFreq: 0.02 };
                case 'medium': return { aiSpeed: 1.2, itemFreq: 0.03 };
                case 'hard': return { aiSpeed: 1.8, itemFreq: 0.04 };
            }
        }
        
        // 处理玩家点击
        function handlePlayerClick(e) {
            if (!gameState.running || gameState.winner >= 0) return;
            
            const boost = gameState.doubleBoost[0] ? 2 : 1;
            gameState.speed[0] = (3 + Math.random() * 2) * boost;
            
            // 点击特效
            const bar = document.getElementById('bar-bg-0');
            const rect = bar.getBoundingClientRect();
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = (e.clientX - rect.left - 20) + 'px';
            effect.style.top = (e.clientY - rect.top - 20) + 'px';
            bar.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }
        
        function handlePlayerTouch(e) {
            e.preventDefault();
            if (!gameState.running || gameState.winner >= 0) return;
            
            const boost = gameState.doubleBoost[0] ? 2 : 1;
            gameState.speed[0] = (3 + Math.random() * 2) * boost;
            
            // 触摸特效
            const touch = e.touches[0];
            const bar = document.getElementById('bar-bg-0');
            const rect = bar.getBoundingClientRect();
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = (touch.clientX - rect.left - 20) + 'px';
            effect.style.top = (touch.clientY - rect.top - 20) + 'px';
            bar.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }
        
        // 显示道具效果
        function showItemPopup(playerIndex, itemKey) {
            const item = ITEMS[itemKey];
            const container = document.getElementById(`player-${playerIndex}`);
            const popup = document.createElement('div');
            popup.className = 'item-popup';
            popup.textContent = item.emoji;
            popup.style.left = '50%';
            popup.style.top = '50%';
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
            
            // 更新状态
            if (playerIndex === 0) {
                status.textContent = `你获得了 ${item.emoji} ${item.name}！`;
            }
        }
        
        // 应用道具效果
        function applyItem(playerIndex, itemKey) {
            const item = ITEMS[itemKey];
            
            showItemPopup(playerIndex, itemKey);
            
            switch(itemKey) {
                case 'boost':
                    gameState.progress[playerIndex] = Math.min(100, gameState.progress[playerIndex] + item.effect);
                    break;
                case 'double':
                    gameState.doubleBoost[playerIndex] = true;
                    setTimeout(() => { gameState.doubleBoost[playerIndex] = false; }, 3000);
                    break;
                case 'jump':
                    const jumpAmount = Math.random() * 30;
                    gameState.progress[playerIndex] = Math.min(100, gameState.progress[playerIndex] + jumpAmount);
                    break;
                case 'slow':
                    gameState.progress[playerIndex] = Math.max(0, gameState.progress[playerIndex] + item.effect);
                    break;
                case 'freeze':
                    gameState.frozen[playerIndex] = true;
                    setTimeout(() => { gameState.frozen[playerIndex] = false; }, 2000);
                    break;
                case 'backward':
                    gameState.progress[playerIndex] = Math.max(0, gameState.progress[playerIndex] + item.effect);
                    break;
            }
        }
        
        // 生成道具
        function spawnItems() {
            const difficulty = getDifficulty();
            const now = Date.now();
            
            for (let i = 0; i < PLAYER_COUNT; i++) {
                if (gameState.frozen[i]) continue;
                if (now - gameState.lastItemTime[i] < 2000) continue;
                
                if (Math.random() < difficulty.itemFreq) {
                    // 玩家更容易获得正面道具，AI更容易获得负面道具
                    let itemKey;
                    if (i === 0) {
                        itemKey = Math.random() < 0.7 ? 
                            POSITIVE_ITEMS[Math.floor(Math.random() * POSITIVE_ITEMS.length)] :
                            NEGATIVE_ITEMS[Math.floor(Math.random() * NEGATIVE_ITEMS.length)];
                    } else {
                        itemKey = Math.random() < 0.5 ? 
                            POSITIVE_ITEMS[Math.floor(Math.random() * POSITIVE_ITEMS.length)] :
                            NEGATIVE_ITEMS[Math.floor(Math.random() * NEGATIVE_ITEMS.length)];
                    }
                    
                    applyItem(i, itemKey);
                    gameState.lastItemTime[i] = now;
                }
            }
        }
        
        // AI行为
        function updateAI() {
            const difficulty = getDifficulty();
            
            for (let i = 1; i < PLAYER_COUNT; i++) {
                if (gameState.frozen[i]) continue;
                
                // AI基础速度 + 随机波动
                const baseSpeed = difficulty.aiSpeed * (0.8 + Math.random() * 0.4);
                const boost = gameState.doubleBoost[i] ? 2 : 1;
                gameState.speed[i] = baseSpeed * boost;
            }
        }
        
        // 更新游戏状态
        function updateGame() {
            if (!gameState.running) return;
            
            const difficulty = getDifficulty();
            
            // 更新AI
            updateAI();
            
            // 生成道具
            spawnItems();
            
            // 更新进度
            for (let i = 0; i < PLAYER_COUNT; i++) {
                if (gameState.frozen[i]) continue;
                
                // 玩家速度衰减
                if (i === 0) {
                    gameState.speed[0] *= 0.95;
                    if (gameState.speed[0] < 0.1) gameState.speed[0] = 0.1;
                }
                
                gameState.progress[i] += gameState.speed[i] * 0.1;
                gameState.progress[i] = Math.min(100, gameState.progress[i]);
                
                // 更新UI
                const percent = Math.floor(gameState.progress[i]);
                document.getElementById(`percent-${i}`).textContent = percent + '%';
                document.getElementById(`bar-fill-${i}`).style.width = percent + '%';
                
                // 检查胜利
                if (gameState.progress[i] >= 100 && gameState.winner < 0) {
                    gameState.winner = i;
                    gameOver(i);
                    return;
                }
            }
            
            gameState.animationId = requestAnimationFrame(updateGame);
        }
        
        // 游戏结束
        function gameOver(winnerIndex) {
            gameState.running = false;
            cancelAnimationFrame(gameState.animationId);
            
            const container = document.getElementById(`player-${winnerIndex}`);
            container.classList.add('winner');
            
            if (winnerIndex === 0) {
                gameState.wins++;
                winsDisplay.textContent = gameState.wins;
                status.innerHTML = '<div class="winner-announcement">🎉 恭喜你获胜！🎉</div>';
            } else {
                gameState.losses++;
                lossesDisplay.textContent = gameState.losses;
                status.innerHTML = `<div class="winner-announcement">💀 ${PLAYER_NAMES[winnerIndex]} 获胜了！</div>`;
            }
            
            startBtn.disabled = false;
            startBtn.textContent = '再来一局';
        }
        
        // 开始游戏
        function startGame() {
            // 重置状态
            gameState.progress = [0, 0, 0, 0];
            gameState.speed = [0, 0, 0, 0];
            gameState.frozen = [false, false, false, false];
            gameState.doubleBoost = [false, false, false, false];
            gameState.winner = -1;
            gameState.lastItemTime = [0, 0, 0, 0];
            
            // 重置UI
            for (let i = 0; i < PLAYER_COUNT; i++) {
                document.getElementById(`percent-${i}`).textContent = '0%';
                document.getElementById(`bar-fill-${i}`).style.width = '0%';
                document.getElementById(`player-${i}`).classList.remove('winner');
            }
            
            status.textContent = '🚀 点击你的进度条加速！';
            startBtn.disabled = true;
            
            gameState.running = true;
            gameState.animationId = requestAnimationFrame(updateGame);
        }
        
        // 重置游戏
        function resetGame() {
            gameState.running = false;
            cancelAnimationFrame(gameState.animationId);
            
            gameState.progress = [0, 0, 0, 0];
            gameState.speed = [0, 0, 0, 0];
            gameState.frozen = [false, false, false, false];
            gameState.doubleBoost = [false, false, false, false];
            gameState.winner = -1;
            
            for (let i = 0; i < PLAYER_COUNT; i++) {
                document.getElementById(`percent-${i}`).textContent = '0%';
                document.getElementById(`bar-fill-${i}`).style.width = '0%';
                document.getElementById(`player-${i}`).classList.remove('winner');
            }
            
            status.textContent = '点击"开始游戏"开始！';
            startBtn.disabled = false;
            startBtn.textContent = '开始游戏';
        }
        
        // 事件监听
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);
        
        // 初始化
        initProgressBars();
    </script>
</body>
</html>
