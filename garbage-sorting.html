<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>垃圾大分类 - Casual Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .score, .timer, .combo { font-size: 1.2rem; font-weight: bold; }
        .score { color: #2ecc71; }
        .timer { color: #e74c3c; }
        .combo { color: #f39c12; }
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .falling-item {
            position: absolute;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            color: #333;
        }
        .falling-item:active { cursor: grabbing; transform: scale(1.1); }
        .falling-item.dragging { 
            z-index: 100; 
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transform: scale(1.15);
        }
        .falling-item .emoji { font-size: 1.5rem; }
        .falling-item .name { font-weight: 600; }
        .bins-container {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        .bin {
            width: 22%;
            height: 120px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            border: 3px dashed rgba(255, 255, 255, 0.3);
        }
        .bin.highlight {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .bin.correct {
            animation: correctPulse 0.5s;
        }
        .bin.wrong {
            animation: wrongShake 0.5s;
        }
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .bin-recyclable { background: linear-gradient(135deg, #3498db, #2980b9); }
        .bin-hazardous { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .bin-kitchen { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .bin-other { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }
        .bin .icon { font-size: 2rem; margin-bottom: 5px; }
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 15px;
            animation: feedbackPop 0.8s ease-out forwards;
            z-index: 1000;
            pointer-events: none;
        }
        .feedback.correct { background: rgba(46, 204, 113, 0.9); }
        .feedback.wrong { background: rgba(231, 76, 60, 0.9); }
        @keyframes feedbackPop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }
        .knowledge-popup {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            max-width: 80%;
            text-align: center;
            animation: knowledgeFade 3s ease-out forwards;
            z-index: 1000;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        @keyframes knowledgeFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .start-screen, .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
        }
        .start-screen h1, .game-over h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
        }
        .btn-start { background: linear-gradient(45deg, #2ecc71, #27ae60); color: white; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-restart { background: linear-gradient(45deg, #3498db, #2980b9); color: white; }
        .btn-restart:hover { transform: scale(1.05); }
        .difficulty-select {
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }
        .difficulty-btn {
            padding: 10px 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: transparent;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .difficulty-btn.active {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.2);
        }
        .stats {
            margin: 20px 0;
            text-align: center;
        }
        .stats div { margin: 10px 0; font-size: 1.2rem; }
        .stats .label { color: #a0a0a0; }
        .stats .value { font-weight: bold; font-size: 1.5rem; }
        .combo-display {
            position: fixed;
            top: 80px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f39c12;
            animation: comboPulse 0.5s infinite alternate;
        }
        @keyframes comboPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>♻️ 垃圾大分类</h1>
        <p style="color: #a0a0a0; margin-bottom: 30px; font-size: 1.1rem;">将垃圾拖拽到正确的分类桶中！</p>
        <div class="difficulty-select">
            <button class="difficulty-btn active" data-difficulty="easy">简单</button>
            <button class="difficulty-btn" data-difficulty="medium">中等</button>
            <button class="difficulty-btn" data-difficulty="hard">困难</button>
        </div>
        <button class="btn btn-start" id="startBtn">开始游戏</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <div class="header">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="timer">时间: <span id="timer">60</span>s</div>
            <div class="combo">连击: <span id="combo">0</span></div>
        </div>
        <div class="game-area" id="gameArea"></div>
        <div class="bins-container">
            <div class="bin bin-recyclable" data-type="recyclable">
                <div class="icon">♻️</div>
                <div>可回收物</div>
            </div>
            <div class="bin bin-hazardous" data-type="hazardous">
                <div class="icon">☠️</div>
                <div>有害垃圾</div>
            </div>
            <div class="bin bin-kitchen" data-type="kitchen">
                <div class="icon">🥬</div>
                <div>厨余垃圾</div>
            </div>
            <div class="bin bin-other" data-type="other">
                <div class="icon">🗑️</div>
                <div>其他垃圾</div>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver" style="display: none;">
        <h1>游戏结束</h1>
        <div class="stats">
            <div><span class="label">最终得分:</span> <span class="value" id="finalScore">0</span></div>
            <div><span class="label">正确分类:</span> <span class="value" id="correctCount">0</span></div>
            <div><span class="label">错误分类:</span> <span class="value" id="wrongCount">0</span></div>
            <div><span class="label">最高连击:</span> <span class="value" id="maxCombo">0</span></div>
        </div>
        <button class="btn btn-restart" id="restartBtn">再来一局</button>
    </div>

            { name: '蜡烛', emoji: '🕯️', type: 'other', knowledge: '蜡烛属于其他垃圾，无法回收。' },
            { name: '竹筷', emoji: '🥢', type: 'other', knowledge: '一次性竹筷属于其他垃圾，无法回收。' },
            { name: '花盆', emoji: '🪴', type: 'other', knowledge: '破旧花盆属于其他垃圾，陶瓷无法回收。' },
            { name: '扫把', emoji: '🧹', type: 'other', knowledge: '破旧扫把属于其他垃圾，无法回收。' },
            { name: '拖把', emoji: '🧹', type: 'other', knowledge: '破旧拖把属于其他垃圾，无法回收。' },
            { name: '旧镜子', emoji: '🪞', type: 'other', knowledge: '破旧镜子属于其他垃圾，无法回收。' }
        ];

        // 游戏状态
        let gameState = {
            running: false,
            score: 0,
            timer: 60,
            combo: 0,
            maxCombo: 0,
            correctCount: 0,
            wrongCount: 0,
            difficulty: 'easy',
            fallingItems: [],
            spawnInterval: null,
            timerInterval: null,
            draggedItem: null,
            dragOffsetX: 0,
            dragOffsetY: 0
        };

        // 难度设置
        const difficultySettings = {
            easy: { spawnRate: 2000, fallSpeed: 1, timeLimit: 90 },
            medium: { spawnRate: 1500, fallSpeed: 1.5, timeLimit: 60 },
            hard: { spawnRate: 1000, fallSpeed: 2, timeLimit: 45 }
        };

        // DOM元素
        const startScreen = document.getElementById('startScreen');
        const gameContainer = document.getElementById('gameContainer');
        const gameOver = document.getElementById('gameOver');
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('combo');
        const finalScore = document.getElementById('finalScore');
        const correctCountDisplay = document.getElementById('correctCount');
        const wrongCountDisplay = document.getElementById('wrongCount');
        const maxComboDisplay = document.getElementById('maxCombo');

        // 初始化
        function init() {
            // 难度选择
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    gameState.difficulty = btn.dataset.difficulty;
                });
            });

            // 开始按钮
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', () => {
                gameOver.style.display = 'none';
                startScreen.style.display = 'flex';
            });
        }

        // 开始游戏
        function startGame() {
            const settings = difficultySettings[gameState.difficulty];
            
            // 重置状态
            gameState.running = true;
            gameState.score = 0;
            gameState.timer = settings.timeLimit;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.correctCount = 0;
            gameState.wrongCount = 0;
            gameState.fallingItems = [];
            
            // 更新UI
            scoreDisplay.textContent = '0';
            timerDisplay.textContent = settings.timeLimit;
            comboDisplay.textContent = '0';
            
            // 切换界面
            startScreen.style.display = 'none';
            gameContainer.style.display = 'flex';
            gameOver.style.display = 'none';
            
            // 清空游戏区域
            gameArea.innerHTML = '';
            
            // 开始生成垃圾
            spawnGarbage();
            gameState.spawnInterval = setInterval(spawnGarbage, settings.spawnRate);
            
            // 开始计时
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                timerDisplay.textContent = gameState.timer;
                
                if (gameState.timer <= 0) {
                    endGame();
                }
            }, 1000);
            
            // 开始动画循环
            requestAnimationFrame(gameLoop);
        }

        // 生成垃圾
        function spawnGarbage() {
            if (!gameState.running) return;
            
            const garbage = garbageData[Math.floor(Math.random() * garbageData.length)];
            const item = document.createElement('div');
            item.className = 'falling-item';
            item.innerHTML = `<span class="emoji">${garbage.emoji}</span><span class="name">${garbage.name}</span>`;
            item.dataset.type = garbage.type;
            item.dataset.knowledge = garbage.knowledge;
            item.dataset.name = garbage.name;
            
            // 随机位置
            const maxX = gameArea.offsetWidth - 150;
            item.style.left = Math.random() * maxX + 'px';
            item.style.top = '-60px';
            
            gameArea.appendChild(item);
            gameState.fallingItems.push({
                element: item,
                y: -60,
                speed: difficultySettings[gameState.difficulty].fallSpeed
            });
            
            // 添加拖拽事件
            addDragListeners(item);
        }

        // 添加拖拽监听
        function addDragListeners(item) {
            // 鼠标事件
            item.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', endDrag);
            
            // 触摸事件
            item.addEventListener('touchstart', startDragTouch);
            document.addEventListener('touchmove', dragTouch);
            document.addEventListener('touchend', endDragTouch);
        }

        function startDrag(e) {
            if (!gameState.running) return;
            e.preventDefault();
            const item = e.target.closest('.falling-item');
            if (!item) return;
            
            gameState.draggedItem = item;
            item.classList.add('dragging');
            
            const rect = item.getBoundingClientRect();
            gameState.dragOffsetX = e.clientX - rect.left;
            gameState.dragOffsetY = e.clientY - rect.top;
        }

        function drag(e) {
            if (!gameState.draggedItem) return;
            e.preventDefault();
            
            const x = e.clientX - gameState.dragOffsetX;
            const y = e.clientY - gameState.dragOffsetY;
            
            gameState.draggedItem.style.left = x + 'px';
            gameState.draggedItem.style.top = y + 'px';
            
            // 检查是否在垃圾桶上方
            checkBinHighlight(e.clientX, e.clientY);
        }

        function endDrag(e) {
            if (!gameState.draggedItem) return;
            
            const item = gameState.draggedItem;
            item.classList.remove('dragging');
            
            // 检查是否放入垃圾桶
            const bin = getBinAtPosition(e.clientX, e.clientY);
            if (bin) {
                checkAnswer(item, bin);
            }
            
            gameState.draggedItem = null;
            clearBinHighlights();
        }

        function startDragTouch(e) {
            if (!gameState.running) return;
            e.preventDefault();
            const touch = e.touches[0];
            const item = e.target.closest('.falling-item');
            if (!item) return;
            
            gameState.draggedItem = item;
            item.classList.add('dragging');
            
            const rect = item.getBoundingClientRect();
            gameState.dragOffsetX = touch.clientX - rect.left;
            gameState.dragOffsetY = touch.clientY - rect.top;
        }

        function dragTouch(e) {
            if (!gameState.draggedItem) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const x = touch.clientX - gameState.dragOffsetX;
            const y = touch.clientY - gameState.dragOffsetY;
            
            gameState.draggedItem.style.left = x + 'px';
            gameState.draggedItem.style.top = y + 'px';
            
            checkBinHighlight(touch.clientX, touch.clientY);
        }

        function endDragTouch(e) {
            if (!gameState.draggedItem) return;
            
            const item = gameState.draggedItem;
            item.classList.remove('dragging');
            
            const touch = e.changedTouches[0];
            const bin = getBinAtPosition(touch.clientX, touch.clientY);
            if (bin) {
                checkAnswer(item, bin);
            }
            
            gameState.draggedItem = null;
            clearBinHighlights();
        }

        // 检查垃圾桶高亮
        function checkBinHighlight(x, y) {
            document.querySelectorAll('.bin').forEach(bin => {
                const rect = bin.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    bin.classList.add('highlight');
                } else {
                    bin.classList.remove('highlight');
                }
            });
        }

        function clearBinHighlights() {
            document.querySelectorAll('.bin').forEach(bin => {
                bin.classList.remove('highlight');
            });
        }

        // 获取点击位置的垃圾桶
        function getBinAtPosition(x, y) {
            const bins = document.querySelectorAll('.bin');
            for (const bin of bins) {
                const rect = bin.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    return bin;
                }
            }
            return null;
        }

        // 检查答案
        function checkAnswer(item, bin) {
            const itemType = item.dataset.type;
            const binType = bin.dataset.type;
            const knowledge = item.dataset.knowledge;
            const name = item.dataset.name;
            
            if (itemType === binType) {
                // 正确
                gameState.correctCount++;
                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) {
                    gameState.maxCombo = gameState.combo;
                }
                
                // 计分：基础分 + 连击加分
                const baseScore = 10;
                const comboBonus = Math.min(gameState.combo * 2, 20);
                const points = baseScore + comboBonus;
                gameState.score += points;
                
                // 更新UI
                scoreDisplay.textContent = gameState.score;
                comboDisplay.textContent = gameState.combo;
                
                // 显示反馈
                showFeedback(`+${points}`, 'correct');
                showKnowledge(knowledge);
                
                // 播放正确动画
                bin.classList.add('correct');
                setTimeout(() => bin.classList.remove('correct'), 500);
                
                // 移除垃圾
                removeItem(item);
            } else {
                // 错误
                gameState.wrongCount++;
                gameState.combo = 0;
                gameState.score = Math.max(0, gameState.score - 5);
                
                // 更新UI
                scoreDisplay.textContent = gameState.score;
                comboDisplay.textContent = '0';
                
                // 显示反馈
                showFeedback('-5', 'wrong');
                showKnowledge(`正确答案：${name}属于${getTypeName(itemType)}。${knowledge}`);
                
                // 播放错误动画
                bin.classList.add('wrong');
                setTimeout(() => bin.classList.remove('wrong'), 500);
                
                // 移除垃圾
                removeItem(item);
            }
        }

        // 获取分类名称
        function getTypeName(type) {
            const names = {
                recyclable: '可回收物',
                hazardous: '有害垃圾',
                kitchen: '厨余垃圾',
                other: '其他垃圾'
            };
            return names[type] || type;
        }

        // 显示反馈
        function showFeedback(text, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;
            feedback.textContent = text;
            document.body.appendChild(feedback);
            
            setTimeout(() => feedback.remove(), 800);
        }

        // 显示知识
        function showKnowledge(text) {
            const popup = document.createElement('div');
            popup.className = 'knowledge-popup';
            popup.textContent = text;
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 3000);
        }

        // 移除垃圾
        function removeItem(item) {
            const index = gameState.fallingItems.findIndex(i => i.element === item);
            if (index > -1) {
                gameState.fallingItems.splice(index, 1);
            }
            item.remove();
        }

        // 游戏循环
        function gameLoop() {
            if (!gameState.running) return;
            
            const settings = difficultySettings[gameState.difficulty];
            
            // 更新所有掉落物品
            gameState.fallingItems.forEach((item, index) => {
                item.y += item.speed;
                item.element.style.top = item.y + 'px';
                
                // 如果掉出屏幕，算作错误
                if (item.y > gameArea.offsetHeight) {
                    gameState.wrongCount++;
                    gameState.combo = 0;
                    comboDisplay.textContent = '0';
                    removeItem(item.element);
                }
            });
            
            requestAnimationFrame(gameLoop);
        }

        // 结束游戏
        function endGame() {
            gameState.running = false;
            clearInterval(gameState.spawnInterval);
            clearInterval(gameState.timerInterval);
            
            // 显示游戏结束界面
            finalScore.textContent = gameState.score;
            correctCountDisplay.textContent = gameState.correctCount;
            wrongCountDisplay.textContent = gameState.wrongCount;
            maxComboDisplay.textContent = gameState.maxCombo;
            
            gameContainer.style.display = 'none';
            gameOver.style.display = 'flex';
        }

        // 初始化游戏
        init();
    </script>
</body>
</html>
